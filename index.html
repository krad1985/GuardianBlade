const ARMOR_TYPES = ['helmet','chestplate','greaves','gauntlets','boots'];
const ARMOR_NAMES = {helmet:'頭盔',chestplate:'胸甲',greaves:'護腿',gauntlets:'手套',boots:'靴子'};
const ARMOR_STATS = {helmet:{hp:3,def:2},chestplate:{hp:5,def:3},greaves:{hp:2,def:2},gauntlets:{hp:1,def:1},boots:{hp:2,spd:0.15}};

function genEquip(type,rarity){
  const base = ARMOR_STATS[type];
  const mult = [0,1,1.5,2.2,3.2,4.5][rarity]||1;
  const eq = {
    id: type+'_'+rarity+'_'+Date.now(), name: RARITY_NAMES[rarity]+ARMOR_NAMES[type],
    type: type, rarity: rarity,
    hp: Math.floor((base.hp||0)*mult),
    def: Math.floor((base.def||0)*mult),
    spd: Math.round(((base.spd||0)*mult)*100)/100
  };
  // 30% 機率附加詛咒
  if(Math.random()<0.3){
    const curses = [
      {atk:-2, name:'鏽蝕', desc:'攻擊-2'},
      {hp:-10, name:'脆弱', desc:'HP-10'},
      {spd:-0.08, name:'沉重', desc:'速度-8%'},
      {goldMult:-0.1, name:'貧窮', desc:'金幣-10%'}
    ];
    const c = curses[Math.floor(Math.random()*curses.length)];
    eq.curse = c;
    eq.name = '詛咒'+eq.name;
    for(const k in c){if(typeof c[k]==='number'){eq[k]=(eq[k]||0)+c[k];}}
    // 詛咒裝備給予一個補償增益
    const boons = [
      {atk:3, name:'', desc:'攻擊+3'},
      {goldMult:0.15, name:'', desc:'金幣+15%'},
      {def:2, name:'', desc:'防禦+2'}
    ];
    const b = boons[Math.floor(Math.random()*boons.length)];
    for(const k in b){if(typeof b[k]==='number'){eq[k]=(eq[k]||0)+b[k];}}
    eq.curseDesc = c.name+'：'+c.desc+' ／ 補償：'+b.desc;
  }
  return eq;
}
function randomEquip(){
  const r = Math.random();
  const rarity = r<0.5?1:r<0.7?2:r<0.85?3:r<0.95?4:5;
  return genEquip(ARMOR_TYPES[Math.floor(Math.random()*5)], rarity);
}

function saveGame(){
  try {
    localStorage.setItem('guardian_blade_save', JSON.stringify({
      permUpgrades: G.permUpgrades, souls: G.souls, gold: G.gold,
      collection: G.collection
    }));
  } catch(e){}
}
function loadGame(){
  try {
    const raw = localStorage.getItem('guardian_blade_save');
    if(raw){
      const d = JSON.parse(raw);
      G.permUpgrades = d.permUpgrades||{};

      G.collection = d.collection||{equips:[]};
    }

}

// ─── UTILITY ────────────────────────────────────────────────────────────────

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function rand(mn,mx){return Math.random()*(mx-mn)+mn;}
function randInt(mn,mx){return Math.floor(rand(mn,mx+1));}
function rndItem(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=randInt(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function rarityColor(r){return RARITY_COLORS[r]||'#aabbcc';}
function rarityName(r){return RARITY_NAMES[r]||'';}

function fillRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function fillCircle(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function drawLine(x1,y1,x2,y2,c,w){ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
function setGlow(c,b){ctx.shadowColor=c;ctx.shadowBlur=b||20;}
function noGlow(){ctx.shadowBlur=0;}

// ─── PARTICLES & EFFECTS ────────────────────────────────────────────────────

function addParticle(x,y,vx,vy,life,color,size,gc){
  G.particles.push({x,y,vx,vy,life,maxLife:life,color,size:size||3,glowColor:gc||color});
}
function addSparks(x,y,n,color,speed){
  for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),sp=rand(1,speed||4);addParticle(x,y,Math.cos(a)*sp,Math.sin(a)*sp,rand(15,35),color,rand(2,4),color);}
}
function addEffect(x,y,radius,color,life){
  G.effects.push({x,y,radius,maxRadius:radius,life:life||30,maxLife:life||30,color});
}
function addExplosion(x,y,radius,color){
  addEffect(x,y,radius,color,20);addSparks(x,y,20,color,6);
}

// ─── ENEMY FACTORY ──────────────────────────────────────────────────────────

function createEnemy(type,waveNum){
  const scale = 1 + (waveNum-1)*0.08;
  const e = {
    x:GW+50,y:rand(60,GH-60),type,
    hp:10,maxHp:10,speed:0.6,dmg:1,size:14,
    color:'#dd4444',eyeColor:'#ffffff',
    value:5,gold:rand(1,3),soulChance:0.03,
    hitTimer:0,slowTimer:0,burnTimer:0,burnDmg:0,shockTimer:0,
    dead:false,anim:rand(0,Math.PI*2),isElite:false,isBoss:false
  };
  switch(type){
    case 'normal':
      e.hp=Math.floor(10*scale);e.maxHp=e.hp;
      e.speed=0.5+waveNum*0.015;e.dmg=1;
      e.color='#dd4444';e.size=14;e.value=5;
      e.gold=rand(1,3);e.soulChance=0.03;break;
    case 'fast':
      e.hp=Math.floor(6*scale);e.maxHp=e.hp;
      e.speed=1.1+waveNum*0.02;e.dmg=1;
      e.color='#ddcc44';e.size=10;e.value=7;
      e.gold=rand(1,2);e.soulChance=0.04;break;
    case 'heavy':
      e.hp=Math.floor(30*scale);e.maxHp=e.hp;
      e.speed=0.3+waveNum*0.01;e.dmg=3;
      e.color='#aa44dd';e.size=20;e.value=12;
      e.gold=rand(3,6);e.soulChance=0.06;break;
    case 'elite':
      e.hp=Math.floor(50*scale);e.maxHp=e.hp;
      e.speed=0.5+waveNum*0.015;e.dmg=2;
      e.color='#ddaa33';e.size=18;e.value=25;
      e.gold=rand(8,15);e.soulChance=0.15;e.isElite=true;break;
    case 'boss':
      e.hp=Math.floor(200*scale);e.maxHp=e.hp;
      e.speed=0.35+waveNum*0.01;e.dmg=5;
      e.color='#cc2244';e.size=32;e.value=100;
      e.gold=rand(30,60);e.soulChance=0.5;e.isBoss=true;break;
  }
  return e;
}

// ─── DROP SYSTEM ────────────────────────────────────────────────────────────

function createDrop(x,y,item){
  return {
    x,y,vx:rand(-1,1),vy:rand(-1,1),life:600,bob:rand(0,Math.PI*2),
    item,collected:false,size:8,
    icon: item.type==='gold'?'💰':item.type==='soul'?'💜':item.type==='weapon'?'🗡️':item.type==='equip'?'🛡️':item.type==='skill'?'📜':item.type==='artifact'?'💎':'•',
    color: item.type==='gold'?'#ffcc44':item.type==='soul'?'#cc66ff':item.type==='weapon'?'#4488ff':item.type==='equip'?'#44dd88':item.type==='skill'?'#ff66aa':item.type==='artifact'?'#ffaa44':'#ffffff'
  };
}

function spawnDrops(x,y,count){
  for(let i=0;i<count;i++){
    const r=Math.random();
    let item;
    if(r<0.55) item={type:'gold',val:randInt(1,3+Math.floor(G.stage/2))};
    else if(r<0.80) item={type:'gold',val:randInt(2,5+Math.floor(G.stage/3))};
    else if(r<0.90) item={type:'soul',val:1};
    else if(r<0.95 && G.player.weaponIdx<WEAPONS.length-1 && Math.random()<0.2) item={type:'weapon',id:WEAPONS[G.player.weaponIdx+1].id};
    else if(r<0.98) item={type:'equip',data:randomEquip()};
    else {const s=rndItem(SKILLS);item={type:'skill',id:s.id};}
    if(item) G.drops.push(createDrop(x+rand(-15,15),y+rand(-15,15),item));
  }
}

function forceDrop(x,y,type){
  let item;
  switch(type){
    case 'soul': item={type:'soul',val:1}; break;
    case 'weapon': if(G.player.weaponIdx<WEAPONS.length-1 && Math.random()<0.3) item={type:'weapon',id:WEAPONS[G.player.weaponIdx+1].id}; else item={type:'gold',val:10}; break;
    default: item={type:'gold',val:5};
  }
  if(item) G.drops.push(createDrop(x+rand(-10,10),y+rand(-10,10),item));
}

// ─── RUN SYSTEM（關卡制 + 分歧路線）────────────────────────────────────────────

function showPathSelect(){
  G.runPhase='path';
  const shuffled = shuffle([...RUN_PATHS]);
  G.pathChoices = shuffled.slice(0,3);
  // 每 3 局強制出現一次 Boss 路線
  if(G.totalRuns>0 && G.totalRuns%3===0 && !G.pathChoices.find(p=>p.id==='boss')){
    G.pathChoices[0]=RUN_PATHS.find(p=>p.id==='boss');
  }
  // 低機率出現隱藏路線（取代一條普通路線）
  if(G.totalRuns>=2 && Math.random()<0.18){
    const hidden = shuffle(HIDDEN_PATHS)[0];
    G.pathChoices[Math.floor(Math.random()*G.pathChoices.length)] = hidden;
    G.hasHiddenPath = true;
  }
  showOverlay('pathselect');
}

function startRun(){
  G.runActive=true;
  G.runPhase='playing';
  G.runTimer=0;
  G.stage=1;
  G.stageEnemyKilled=0;
  G.stageMaxEnemy=12;
  G.stageNotify=0;
  G.roundSouls=0;
  G.roundGold=0;
  G.combo=0;
  G.guardian.hp = G.guardian.maxHp;
  G.guardian.shieldBlock = G.player.artifacts.includes('shield')?1:0;
  // 切換地形
  const tids = shuffle(TERRAINS.map(t=>t.id));
  const cur = TERRAINS.find(t=>t.id===G.terrain?.id);
  G.terrain = TERRAINS.find(t=>t.id!==(cur?cur.id:''));
  G.enemies=[];
  G.totalTime=0;
  // 套用欄位解鎖
  G.player.artifactSlots = 2 + (G.permUpgrades.perm_art_slot||0);
  G.player.skillSlots = 2 + (G.permUpgrades.perm_sk_slot||0);
  // 初始生成第一關
  spawnStage();
}

function spawnStage(){
  const mod = G.pathMods || {};
  const stage = G.stage;
  G.stageEnemyKilled=0;
  // 每關敵人總數：50 起，每關 +20，最高 250
  G.stageMaxEnemy = Math.min(250, 50 + (stage - 1) * 20);
  G.enemies=[];
  const count = G.stageMaxEnemy;
  for(let i=0;i<count;i++){
    let type='normal';
    const r=Math.random();
    // 隨關卡進階，敵人類型比例變化
    const eliteRate = Math.min(0.3, 0.03 + stage*0.025) * (mod.eliteRate||1);
    const heavyRate = 0.15 + stage*0.02;
    const fastRate = 0.15;
    const bossStage = (mod.bossWave && stage%5===0);
    if(bossStage && i===0){
      type='boss';
    } else if(r<eliteRate){
      type='elite';
    } else if(r<eliteRate+heavyRate){
      type='heavy';
    } else if(r<eliteRate+heavyRate+fastRate){
      type='fast';
    }
    const e = createEnemy(type, stage);
    if(mod.enemyHp) e.hp = Math.max(1, Math.floor(e.hp * mod.enemyHp));
    if(mod.enemyDmg) e.dmg = Math.max(0.5, e.dmg * mod.enemyDmg);
    // 散布在右側
    e.x = GW + 30 + Math.random()*120;
    e.y = 50 + Math.random()*(PLAY_H-100);
    G.enemies.push(e);
  }
  // 顯示關卡通知
  G.stageNotify = 60; // 1 秒
}

function checkStageClear(){
  // 檢查是否所有敵人已清除
  const alive = G.enemies.filter(e=>!e.dead).length;
  const killed = G.stageMaxEnemy - alive;
  if(alive===0 && G.stageMaxEnemy>0){
    // 關卡完成
    G.stage++;
    spawnStage();
  }
}

function endRun(reason){
  G.runActive=false;
  G.runPhase='result';
  G.totalRuns++;
  // 結算：根據關卡數與擊殺數
  const soulBonus = Math.floor(G.stage*2) + Math.floor(G.kills/20);
  const soulMult = (G.pathMods.soulMult||1);
  G.souls += Math.floor(soulBonus * soulMult);
  G.roundSouls = Math.floor(soulBonus * soulMult);
  G.roundGold = G.roundGold;
  showOverlay('runresult');
}

function nextRun(){
  G.runActive=false;
  G.showOverlay=false;
  OV.innerHTML='';
  const paths = shuffle(RUN_PATHS);
  G.pathMods = {...paths[0].mods, _id:paths[0].id, _name:paths[0].name};
  G.hiddenRun = false;
  recalcStats();
  startRun();
}

// ─── ATTACK SYSTEM ──────────────────────────────────────────────────────────

function playerSwing(){
  const p=G.player;
  if(p.isSwinging||!G.canSwing) return;
  p.isSwinging=true;
  p.swingTimer=Math.max(12,Math.floor(30*p.atkSpd));
  p.swingProg=0;
  p.swingAngle=0;

  const wep=WEAPONS[p.weaponIdx];
  let baseAtk=p.atk+wep.atk;
  let rangeVal=(p.range+wep.range)*(p.artifacts.includes('cleave')?1.5:1);
  if(G.berserkActive) baseAtk=Math.floor(baseAtk*1.5);
  const swingArc=Math.PI*0.8;
  const dir=p.facing;

  let hitCount=0;
  for(let i=G.enemies.length-1;i>=0;i--){
    const e=G.enemies[i];
    if(e.dead||dist(p,e)>rangeVal) continue;
    const angle=Math.atan2(e.y-p.y,e.x-p.x);
    let diff=angle-(dir>0?0:Math.PI);
    if(diff>Math.PI) diff-=Math.PI*2;
    if(diff<-Math.PI) diff+=Math.PI*2;
    if(Math.abs(diff)>swingArc/2) continue;

    let dmg=Math.max(1,Math.floor(baseAtk-e.dmg*0.2));
    e.hp-=dmg;
    e.hitTimer=10;
    hitCount++;
    // 傷害數字
    G.dmgNumbers.push({x:e.x+rand(-8,8),y:e.y-rand(5,15),txt:dmg,life:25,color:'#ffcc44'});

    if(p.artifacts.includes('clone')){
      const bonus=G.berserkActive?1.5:1;
      e.hp-=Math.floor(baseAtk*0.5*bonus);
    }
    if(p.artifacts.includes('fire_orb')){e.burnTimer=60;e.burnDmg=Math.floor(baseAtk*0.15);}
    if(p.artifacts.includes('ice_orb')){e.slowTimer=40;}
    if(p.artifacts.includes('thunder_orb')&&hitCount%3===0){ chainLightning(e,baseAtk); }

    if(e.hp<=0){ enemyKilled(e,baseAtk); }
  }

  if(hitCount>0){
    G.shakeMag=Math.min(G.shakeMag+3,10);
    if(p.artifacts.includes('vampire')){
      let heal=Math.floor(baseAtk*0.1)*hitCount;
      G.guardian.hp=Math.min(G.guardian.maxHp,G.guardian.hp+heal);
      if(heal>0) addParticle(G.guardian.x,G.guardian.y-20,0,-1,20,'#66ff88',5,'#66ff88');
    }
  }
  G.shakeMag*=0.8;
  G.canSwing=false;
  G.swingCooldownTimer=Math.max(5,Math.floor(15*p.atkSpd));
}

function enemyKilled(e,baseAtk){
  const p=G.player;
  addSparks(e.x,e.y,10,'#ffcc44',3);
  addParticle(e.x,e.y,0,0,15,'#ffffff',5,'#ffffff');
  e.dead=true;

  p.killStreak++;
  if(p.artifacts.includes('berserk')&&p.killStreak>=10){
    G.berserkActive=true;
    G.berserkTimer=300;
    p.killStreak=0;
    addEffect(p.x,p.y,40,'#ff2244',15);
  }

  const goldMult=p.artifacts.includes('greed')?1.5:1;
  G.gold+=Math.floor(e.gold*goldMult);
  G.score+=e.value;

  if(Math.random()<e.soulChance){ G.souls++; addParticle(e.x,e.y,0,-2,25,'#cc66ff',6,'#cc66ff'); saveGame(); }

  if(p.artifacts.includes('explode')){
    addExplosion(e.x,e.y,40,'#ff8844');
    for(let j=G.enemies.length-1;j>=0;j--){
      if(j===G.enemies.indexOf(e)||G.enemies[j].dead) continue;
      if(dist(G.enemies[j],e)<50){
        G.enemies[j].hp-=Math.floor(baseAtk*0.6);
        if(G.enemies[j].hp<=0) G.enemies[j].dead=true;
      }
    }
    if(p.artifacts.includes('fire_orb')){
      G.effects.push({x:e.x,y:e.y,radius:60,maxRadius:60,life:40,maxLife:40,color:'#ff4400',fireGround:true});
    }
  }

  G.combo++;
  if(G.combo>G.maxCombo) G.maxCombo=G.combo;
  // 掉落（基礎 8%）
  if(Math.random()<0.08) spawnDrops(e.x,e.y,1);
  // 菁英額外掉落
  if(e.isElite){
    if(Math.random()<0.3) spawnDrops(e.x,e.y,1);
    forceDrop(e.x,e.y,'soul');
    // 菁英 20% 機率掉落指定稀有物品（技能書）
    if(Math.random()<0.2){const s=rndItem(SKILLS);G.drops.push(createDrop(e.x+rand(-10,10),e.y+rand(-10,10),{type:'skill',id:s.id}));}
  }
  // BOSS 大量掉落
  if(e.isBoss){
    spawnDrops(e.x,e.y,4);
    forceDrop(e.x,e.y,'soul');
    // Boss 必掉技能書
    const s=rndItem(SKILLS);G.drops.push(createDrop(e.x+rand(-10,10),e.y+rand(-10,10),{type:'skill',id:s.id}));
    if(Math.random()<0.5) forceDrop(e.x,e.y,'weapon');
  }
}

function chainLightning(source,dmg){
  let targets=G.enemies.filter(e=>!e.dead&&dist(e,source)<150);
  targets.sort((a,b)=>dist(a,source)-dist(b,source));
  for(let i=0;i<Math.min(3,targets.length);i++){
    const t=targets[i];
    t.hp-=Math.floor(dmg*0.5);
    t.hitTimer=10;t.shockTimer=20;
    G.dmgNumbers.push({x:t.x+rand(-5,5),y:t.y-rand(5,10),txt:Math.floor(dmg*0.5),life:20,color:'#44ddff'});
    if(G.player.artifacts.includes('ice_orb')) t.slowTimer=30;
    drawLine(source.x,source.y,t.x,t.y,'#44ddff',3);
    addSparks(t.x,t.y,6,'#44ddff',2);
    if(t.hp<=0){t.dead=true; enemyKilled(t,Math.floor(dmg*0.5));}
  }
}

// ─── SKILL SYSTEM ───────────────────────────────────────────────────────────

function castSkill(skillId){
  const p=G.player;
  if(p.skillTimers[skillId]>0) return;
  const sk=SKILLS.find(s=>s.id===skillId);
  if(!sk) return;
  p.skillTimers[skillId]=sk.cd*60;
  const lvl=p.skillLevels[skillId]||1;
  const mult=1+(lvl-1)*0.2;
  const atk=p.atk;

  switch(skillId){
    case 'whirlwind':{
      const d=Math.floor(atk*(sk.dmg||1.5)*mult);
      const r=sk.range||120;
      for(let i=G.enemies.length-1;i>=0;i--){
        const e=G.enemies[i];if(e.dead||dist(p,e)>r)continue;
        e.hp-=d;e.hitTimer=10;G.dmgNumbers.push({x:e.x+rand(-5,5),y:e.y-rand(5,10),txt:d,life:20,color:'#88ccff'});
        if(e.hp<=0){e.dead=true;enemyKilled(e,d);}
      }
      addEffect(p.x,p.y,r,'#88ccff',15);addSparks(p.x,p.y,25,'#88ccff',5);
      break;
    }
    case 'shockwave':{
      const d=Math.floor(atk*(sk.dmg||1.2)*mult);
      G.projectiles.push({x:p.x,y:p.y,dir:p.facing,speed:6,range:sk.range||250,radius:15,dmg:d,hit:new Set(),life:60,color:'#4488ff'});
      break;
    }
    case 'blade_rain':{
      const d=Math.floor(atk*(sk.dmg||2.0)*mult);
      const r=sk.range||200;
      for(let i=0;i<12;i++) addParticle(rand(p.x-80,p.x+80),rand(p.y-r/2,p.y-20),rand(-0.5,0.5),rand(2,5),30,'#aaccff',4,'#aaccff');
      for(let i=G.enemies.length-1;i>=0;i--){
        const e=G.enemies[i];if(e.dead||Math.abs(e.x-p.x)>r||e.y>p.y||e.y<p.y-r)continue;
        e.hp-=d;e.hitTimer=10;if(e.hp<=0){e.dead=true;enemyKilled(e,d);}
      }
      break;
    }
    case 'barrier':
      G.guardian.shieldBlock=999;
      setTimeout(()=>{G.guardian.shieldBlock=G.player.artifacts.includes('shield')?1:0;},(sk.dur||3)*1000);
      addEffect(G.guardian.x,G.guardian.y,60,'#66ddff',30);
      break;
    case 'heal_skill':{
      const h=Math.floor((sk.heal||20)*mult);
      G.guardian.hp=Math.min(G.guardian.maxHp,G.guardian.hp+h);
      addEffect(G.guardian.x,G.guardian.y,40,'#66ff88',20);
      break;
    }
    case 'fury':
      G.berserkActive=true;G.berserkTimer=(sk.dur||5)*60;
      addEffect(p.x,p.y,50,'#ff4444',15);
      break;
    case 'slow_time':
      for(const e of G.enemies){e.slowTimer=(sk.dur||4)*60;}
      addEffect(p.x,p.y,200,'#88ddff',25);
      break;
    case 'thunder':{
      const d=Math.floor(atk*(sk.dmg||3.0)*mult);
      let target=null,td=Infinity;
      for(const e of G.enemies){if(!e.dead&&dist(p,e)<td){target=e;td=dist(p,e);}}
      if(target){
        target.hp-=d;target.hitTimer=15;
        G.dmgNumbers.push({x:target.x+rand(-5,5),y:target.y-rand(5,10),txt:d,life:20,color:'#ffdd44'});
        addEffect(target.x,target.y,30,'#ffdd44',10);addSparks(target.x,target.y,20,'#ffdd44',4);
        if(target.hp<=0){target.dead=true;enemyKilled(target,d);}
      }
      break;
    }
    case 'shadow_strike':{
      const d=Math.floor(atk*(sk.dmg||2.5)*mult);
      const r=sk.range||140;
      let target=null,td=Infinity;
      for(const e of G.enemies){if(!e.dead&&dist(p,e)<td){target=e;td=dist(p,e);}}
      if(target){
        addEffect(p.x,p.y,40,'#6644cc',10);
        p.x=clamp(target.x+rand(-30,30),40,GW-40);
        p.y=clamp(target.y+rand(-30,30),40,PLAY_H-40);
        addEffect(p.x,p.y,50,'#8866ff',15);
        for(let i=G.enemies.length-1;i>=0;i--){
          const e=G.enemies[i];if(e.dead||dist(p,e)>r)continue;
        e.hp-=d;e.hitTimer=10;G.dmgNumbers.push({x:e.x+rand(-5,5),y:e.y-rand(5,10),txt:d,life:20,color:'#aaccff'});
        if(e.hp<=0){e.dead=true;enemyKilled(e,d);}
        }
      }
      break;
    }
  }
}

// ─── SYNERGY ────────────────────────────────────────────────────────────────

function checkSynergies(){
  G.player.activeSynergies=[];
  const a=G.player.artifacts;
  for(const syn of SYNERGIES){
    if(a.includes(syn.pair[0])&&a.includes(syn.pair[1])){
      G.player.activeSynergies.push(syn);
    }
  }
}

function checkSynergyForArt(id){
  const a=G.player.artifacts;
  for(const syn of SYNERGIES){
    if((syn.pair[0]===id&&a.includes(syn.pair[1]))||(syn.pair[1]===id&&a.includes(syn.pair[0]))) return '✨ '+syn.name;
  }
  return '';
}

// ─── STAT CALC ──────────────────────────────────────────────────────────────

function recalcStats(){
  const p=G.player, wep=WEAPONS[p.weaponIdx]||WEAPONS[0];
  let atk=wep.atk, range=wep.range, spd=wep.spd, hp=100, def=0, spdMult=1;
  const pu=G.permUpgrades;
  atk+=(pu.perm_atk||0)*2;
  hp+=(pu.perm_hp||0)*5;
  def+=(pu.perm_armor||0);
  for(const eq of Object.values(p.equips)){if(eq){hp+=eq.hp||0;def+=eq.def||0;spdMult-=eq.spd?(-eq.spd):0;}}
  // 基礎速度 3.0 + 靴子加成
  p.speed = 3.0 + spdMult*0.5;
  const ru=G.runUpgrades;
  atk+=(ru.atk||0)*2;
  range+=(ru.range||0)*3;
  spd=Math.max(0.3,spd-(ru.atkspd||0)*0.03);
  hp+=(ru.hp||0)*5;
  p.maxHp=Math.max(20,hp);
  p.atk=Math.max(1,atk);
  p.range=Math.max(30,range);
  p.atkSpd=Math.max(0.15,spd);
  p.def=Math.max(0,def);
  p.artifactSlots = 2 + (pu.perm_art_slot||0);
  p.skillSlots = 2 + (pu.perm_sk_slot||0);
  if(p.hp>p.maxHp)p.hp=p.maxHp;
}

// ─── GAME OVER ──────────────────────────────────────────────────────────────

function gameOver(){
  G.screen='gameover';
  G.runActive=false;
  document.getElementById('pauseBtn').style.display='none';
  // 追蹤最佳進度
  if(G.stage>(G.permUpgrades.bestStage||0)){
    G.permUpgrades.bestStage=G.stage;
  }
  G.permUpgrades.totalRuns=(G.permUpgrades.totalRuns||0)+1;
  // 靈魂碎片獎勵（全 session 結算）
  const soulReward=Math.floor(G.totalRuns*2)+Math.floor(G.kills/30);
  G.souls+=soulReward;
  saveGame();
  showOverlay('gameover');
}

// ─── INIT ───────────────────────────────────────────────────────────────────

function initGame(){
  G.score=0;G.gold=100;G.kills=0;G.stage=1;
  G.enemies=[];G.drops=[];G.particles=[];G.effects=[];G.projectiles=[];G.dmgNumbers=[];
  G.combo=0;G.maxCombo=0;
  G.berserkActive=false;G.berserkTimer=0;G.totalTime=0;
  G.runUpgrades={};
  G.totalRuns=0;G.roundSouls=0;G.roundGold=0;G.hiddenRun=false;
  const p=G.player;
  p.x=200;p.y=GH/2;p.hp=100;p.maxHp=100;p.speed=3.0;
  p.atk=10;p.range=60;p.atkSpd=0.6;p.def=0;
  p.artifactSlots=2;p.skillSlots=2;
  p.swingTimer=0;p.swingAngle=0;p.isSwinging=false;p.facing=1;
  p.weaponIdx=0;p.equips={};p.skills=[];p.artifacts=[];p.activeSynergies=[];
  p.killStreak=0;p.skillTimers={};p.skillLevels={};
  G.guardian.x=80;G.guardian.y=GH/2;G.guardian.hp=100;G.guardian.maxHp=100;G.guardian.shieldBlock=0;
  loadGame();
  recalcStats();
  G.guardian.hp=G.guardian.maxHp;
  p.hp=p.maxHp;
  G.screen='playing';
  document.getElementById('pauseBtn').style.display='block';
  // 隨機選擇一條路線，直接開始
  const paths = shuffle(RUN_PATHS);
  G.pathMods = {...paths[0].mods, _id:paths[0].id, _name:paths[0].name};
  G.hiddenRun = false;
  startRun();
}

// ─── UPDATE ─────────────────────────────────────────────────────────────────

function update(){
  const p=G.player;

  // Move player toward mouse
  if(G.screen==='playing'){
    const dx=G.mouseX-p.x, dy=G.mouseY-p.y;
    const d=Math.hypot(dx,dy);
    if(d>5){
      p.x+=(dx/d)*p.speed;p.y+=(dy/d)*p.speed;
      p.facing=dx>0?1:-1;
    }
    p.x=clamp(p.x,25,GW-25);p.y=clamp(p.y,25,PLAY_H-25);
  }

  // Swing animation
  if(p.isSwinging){
    p.swingTimer-=G.dt;
    p.swingProg=1-p.swingTimer/30;
    if(p.swingTimer<=0){p.isSwinging=false;p.swingTimer=0;p.swingProg=1;}
  }

  // Swing cooldown
  if(!G.canSwing){
    G.swingCooldownTimer-=G.dt;
    if(G.swingCooldownTimer<=0){G.canSwing=true;G.swingCooldownTimer=0;}
  }

  // Auto-attack
  if(G.runActive && G.canSwing && !p.isSwinging && G.enemies.some(e=>!e.dead&&dist(p,e)<p.range+60)){
    playerSwing();
  }

  // Berserk timer
  if(G.berserkActive){G.berserkTimer-=G.dt;if(G.berserkTimer<=0){G.berserkActive=false;G.berserkTimer=0;}}

  // Update enemies
  for(let i=G.enemies.length-1;i>=0;i--){
    const e=G.enemies[i];
    if(e.dead){G.enemies.splice(i,1);continue;}
    e.anim+=0.03;
    if(e.hitTimer>0) e.hitTimer--;
    if(e.slowTimer>0) e.slowTimer--;
    if(e.burnTimer>0){e.burnTimer--;if(e.burnTimer%10===0){e.hp-=e.burnDmg;addParticle(e.x+rand(-5,5),e.y+rand(-5,5),rand(-1,1),rand(-1,1),15,'#ff6600',3,'#ff6600');}}
    if(e.shockTimer>0) e.shockTimer--;

    let spd=e.speed*(e.slowTimer>0?0.3:1);
    e.x-=spd;
    e.y+=Math.sin(e.anim)*0.2;

    // Reached guardian
    if(e.x<=G.guardian.x+25){
      if(G.guardian.shieldBlock>0){
        G.guardian.shieldBlock--;
        addEffect(G.guardian.x,G.guardian.y,50,'#66ddff',15);
        if(G.player.artifacts.includes('thorns')){
          const m=G.player.artifacts.includes('shield')?2:1;
          e.hp-=Math.floor(e.dmg*0.25*m);
          addSparks(e.x,e.y,8,'#88ff44',3);
        }
        e.dead=true;continue;
      }
      G.guardian.hp-=e.dmg;
      addEffect(G.guardian.x-10,G.guardian.y,25,'#ff4444',10);
      if(G.player.artifacts.includes('thorns')){
        const m=G.player.artifacts.includes('shield')?2:1;
        e.hp-=Math.floor(e.dmg*0.25*m);
        addSparks(e.x,e.y,6,'#88ff44',2);
      }
      e.dead=true;
      if(G.guardian.hp<=0){G.guardian.hp=0;if(G.runActive)endRun('death');else gameOver();return;}
    }

    // Poison aura
    if(G.player.artifacts.includes('poison')&&dist(e,G.guardian)<100){
      e.hp-=0.5;
      if(Math.random()<0.05) addParticle(e.x+rand(-8,8),e.y+rand(-8,8),0,0,20,'#66ff44',3,'#66ff44');
      if(e.hp<=0){e.dead=true;addSparks(e.x,e.y,8,'#44ff66',2);}
    }
  }

  // Regen
  if(G.player.artifacts.includes('heal_stone')&&G.totalTime%480===0){
    G.guardian.hp=Math.min(G.guardian.maxHp,G.guardian.hp+10);
    addParticle(G.guardian.x,G.guardian.y-20,0,-1,20,'#66ff88',4,'#66ff88');
  }

  // Auto-cast skills
  for(const sk of SKILLS){
    if(!G.player.skills.includes(sk.id)) continue;
    if(!G.player.skillTimers[sk.id]) G.player.skillTimers[sk.id]=0;
    G.player.skillTimers[sk.id]-=G.dt;
    if(G.player.skillTimers[sk.id]<=0) castSkill(sk.id);
  }

  // Drops（預設自動吸引）
  for(let i=G.drops.length-1;i>=0;i--){
    const d=G.drops[i];d.life--;d.bob+=0.03;
    d.x+=d.vx*0.5;d.y+=d.vy*0.5+Math.sin(d.bob)*0.1;
    d.vx*=0.95;d.vy*=0.95;
    if(d.life<=0){G.drops.splice(i,1);continue;}
    // 自動吸引（所有掉落物自動飛向玩家）
    const attraction = G.player.artifacts.includes('magnet') ? 250 : 120;
    if(dist(d,G.player)<attraction){
      const dd=dist(d,G.player);
      if(dd>15){
        const pullSpeed = G.player.artifacts.includes('magnet') ? 6 : 3;
        d.x+=(G.player.x-d.x)/dd*pullSpeed;
        d.y+=(G.player.y-d.y)/dd*pullSpeed;
      }
      if(dist(d,G.player)<25){collectDrop(d);G.drops.splice(i,1);}
    }
  }

  // Damage numbers
  for(let i=G.dmgNumbers.length-1;i>=0;i--){
    const dn=G.dmgNumbers[i];
    dn.y-=1.5;
    dn.life--;
    if(dn.life<=0) G.dmgNumbers.splice(i,1);
  }

  // Projectiles
  for(let i=G.projectiles.length-1;i>=0;i--){
    const pr=G.projectiles[i];pr.x+=pr.dir*pr.speed;pr.life--;
    if(pr.life<=0||pr.range<=0){G.projectiles.splice(i,1);continue;}
    pr.range-=pr.speed;
    for(const e of G.enemies){
      if(e.dead||pr.hit.has(e)) continue;
      if(dist(pr,e)<pr.radius+8){
        e.hp-=pr.dmg;e.hitTimer=10;pr.hit.add(e);
        addSparks(e.x,e.y,6,'#4488ff',2);
        if(e.hp<=0){e.dead=true;enemyKilled(e,pr.dmg);}
      }
    }
  }

  // Particles
  for(let i=G.particles.length-1;i>=0;i--){
    const pt=G.particles[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.life--;
    pt.vx*=0.97;pt.vy*=0.97;
    if(pt.life<=0) G.particles.splice(i,1);
  }

  // Effects
  for(let i=G.effects.length-1;i>=0;i--){
    G.effects[i].life--;
    if(G.effects[i].life<=0) G.effects.splice(i,1);
  }

  // Stage 系統：檢查關卡進度
  if(G.runActive && G.runPhase==='playing'){
    G.runTimer += G.dt;
    // 守護劍 HP=0 → 結束
    if(G.guardian.hp<=0){
      G.guardian.hp=0;
      endRun('death');
    }
    // 關卡通知計時
    if(G.stageNotify>0) G.stageNotify--;
    // 檢查關卡是否完成
    checkStageClear();
  }

  // Background mist
  if(Math.random()<0.15 && G.terrain?.id!=='lava') addParticle(rand(0,GW),GH+5,rand(-0.2,0.2),rand(-0.8,-0.3),rand(60,180),'rgba(100,120,180,0.2)',rand(1,3));
  if(G.terrain?.id==='lava' && Math.random()<0.2) addParticle(rand(0,GW),GH-rand(0,40),rand(-0.5,0.5),rand(-1.5,-0.5),rand(30,60),'rgba(255,150,50,0.3)',rand(1,3));

  G.totalTime++;
}

// ─── COLLECT DROP ────────────────────────────────────────────────────────────

function collectDrop(d){
  const item=d.item;
  switch(item.type){
    case 'gold':{const v=item.val||1;G.gold+=v;G.roundGold+=v;addParticle(d.x,d.y,0,-2,10,'#ffcc44',4,'#ffcc44');}break;
    case 'soul':{const v=item.val||1;G.souls+=v;G.roundSouls+=v;addParticle(d.x,d.y,0,-2,15,'#cc66ff',5,'#cc66ff');saveGame();}break;
    case 'weapon':{
      const idx=WEAPONS.findIndex(w=>w.id===item.id);
      if(idx>G.player.weaponIdx){G.player.weaponIdx=idx;addEffect(d.x,d.y,30,'#4488ff',15);recalcStats();}
      break;
    }
    case 'equip':{
      const eq=item.data;if(!eq)break;
      // 加入收藏（可跨局保留）
      if(!G.collection) G.collection={equips:[]};
      const exist = G.collection.equips.find(e=>e.id===eq.id);
      if(!exist){
        G.collection.equips.push(eq);
        saveGame();
      }
      // 若目前未裝備此部位，自動穿上
      if(!G.player.equips[eq.type] || eq.rarity > G.player.equips[eq.type].rarity){
        G.player.equips[eq.type]=eq;
        addEffect(d.x,d.y,30,'#44dd88',15);
        recalcStats();
      }
      break;
    }
    case 'skill':{
      const sid=item.id;
      const slots = G.player.skillSlots;
      if(!G.player.skills.includes(sid)){
        if(G.player.skills.length >= slots){
          // 欄位已滿，顯示替換選項（不中斷遊戲，引導玩家選擇）
          showReplaceDialog('skill', sid);
          addParticle(d.x,d.y,0,0,8,'#ff66aa',4);
          return;
        }
        G.player.skills.push(sid);G.player.skillLevels[sid]=1;
      } else {
        G.player.skillLevels[sid]=(G.player.skillLevels[sid]||1)+1;
      }
      addEffect(d.x,d.y,30,'#ff66aa',15);break;
    }
    case 'artifact':{
      const aid=item.id;
      const slots = G.player.artifactSlots;
      if(!G.player.artifacts.includes(aid)){
        if(G.player.artifacts.length >= slots){
          showReplaceDialog('artifact', aid);
          addParticle(d.x,d.y,0,0,8,'#ffaa44',4);
          return;
        }
        G.player.artifacts.push(aid);checkSynergies();
      }
      addEffect(d.x,d.y,35,'#ffaa44',20);break;
    }
  }
  addParticle(d.x,d.y,0,0,8,'#ffffff',4);
}

// ─── DRAWING ────────────────────────────────────────────────────────────────

function drawBackground(){
  const t = G.terrain || TERRAINS[0];
  const grad=ctx.createLinearGradient(0,0,0,GH);
  grad.addColorStop(0,t.bg);grad.addColorStop(0.5,t.bg);grad.addColorStop(1,t.bg);
  ctx.fillStyle=grad;ctx.fillRect(0,0,GW,GH);

  // Floor (respects play zone)
  fillRect(0,PLAY_H-45,GW,45,t.floor);
  fillRect(0,PLAY_H-45,GW,2,t.line);

  // Pillars left
  for(let i=0;i<2;i++){
    const px=10+i*50;
    fillRect(px,30,30,PLAY_H-80,t.accent);
    fillRect(px-2,30,34,4,'rgba(60,65,90,0.2)');
    fillRect(px-2,PLAY_H-79,34,4,'rgba(60,65,90,0.2)');
  }

  // Gate pillars right
  for(let i=0;i<2;i++){
    const px=GW-100+i*60;
    fillRect(px,20,35,PLAY_H-70,t.accent);
    fillRect(px-2,20,39,4,'rgba(60,65,90,0.2)');
    fillRect(px-2,PLAY_H-69,39,4,'rgba(60,65,90,0.2)');
  }

  // Dark arch
  ctx.strokeStyle='rgba(60,50,80,0.5)';ctx.lineWidth=6;
  ctx.beginPath();ctx.arc(GW-25,PLAY_H/2,100,-Math.PI/2-0.5,Math.PI/2+0.5);ctx.stroke();
  fillRect(GW-30,PLAY_H/2-110,20,220,'rgba(20,15,30,0.3)');

  // 熔岩地形額外效果
  if(t.id==='lava'){
    for(let i=0;i<3;i++){
      const lx = 100 + i*280 + Math.sin(G.totalTime*0.02+i)*20;
      fillRect(lx,PLAY_H-43,60,36,'rgba(255,100,20,0.08)');
    }
  }
  // 冰封地形額外效果
  if(t.id==='frost'){
    for(let i=0;i<5;i++){
      const fx = 50 + i*180;
      fillRect(fx,PLAY_H-47,4,40,'rgba(100,180,255,0.06)');
    }
  }
}

function drawGuardianSword(){
  const g=G.guardian,x=g.x,y=g.y;
  const hpR=g.hp/g.maxHp;
  const glowC=hpR>0.5?`rgba(100,200,255,${0.3+hpR*0.3})`:`rgba(255,80,80,${0.3+(1-hpR)*0.4})`;

  // Pedestal
  fillRect(x-22,y-35,44,70,'rgba(40,35,60,0.7)');
  fillRect(x-28,y+25,56,15,'rgba(60,50,90,0.5)');
  fillRect(x-15,y-48,30,15,'rgba(60,50,90,0.5)');

  // Pedestal glow
  setGlow('rgba(120,80,255,0.3)',30);
  fillRect(x-28,y-50,56,100,'rgba(120,80,255,0.08)');
  noGlow();

  // Blade
  setGlow(glowC,25);
  ctx.fillStyle='#8899cc';
  ctx.beginPath();
  ctx.moveTo(x-4,y-45);ctx.lineTo(x+4,y-45);
  ctx.lineTo(x+6,y-8);ctx.lineTo(x+4,y+10);
  ctx.lineTo(x-4,y+10);ctx.lineTo(x-6,y-8);
  ctx.closePath();ctx.fill();

  // Glowing core
  const coreC=hpR>0.5?'#66ddff':'#ff6666';
  fillRect(x-1,y-38,2,38,coreC);
  setGlow(coreC,12);
  fillCircle(x,y-42,4,coreC);
  fillCircle(x,y+8,3,coreC);
  noGlow();

  // HP bar
  const bw=50;
  fillRect(x-bw/2,y-60,bw,6,'rgba(0,0,0,0.6)');
  ctx.fillStyle=hpR>0.5?'#66ff88':hpR>0.25?'#ffcc44':'#ff4444';
  ctx.fillRect(x-bw/2+1,y-59,(bw-2)*Math.max(0,hpR),4);
  ctx.fillStyle='#ccddff';ctx.font='9px sans-serif';ctx.textAlign='center';
  ctx.fillText(Math.ceil(g.hp)+'/'+g.maxHp,x,y-65);
}

function drawPlayer(){
  const p=G.player,px=p.x,py=p.y,facing=p.facing;

  // 角色光暈（根據 HP 比例）
  const hpGlow = p.hp/p.maxHp;
  const glowColor = hpGlow>0.5 ? `rgba(80,160,255,${0.08+hpGlow*0.1})` : `rgba(255,80,80,${0.1+(1-hpGlow)*0.15})`;
  setGlow(glowColor,30);
  ctx.beginPath();ctx.arc(px,py,35,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0)';ctx.fill();
  noGlow();

  // Shadow (橢圓柔和)
  const gradShadow = ctx.createRadialGradient(px,py+22,0,px,py+22,20);
  gradShadow.addColorStop(0,'rgba(0,0,0,0.35)');gradShadow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gradShadow;ctx.beginPath();ctx.ellipse(px,py+22,20,6,0,0,Math.PI*2);ctx.fill();

  // 背部光翼（當 berserk 或 combo 高時）
  if(G.berserkActive || G.combo>5){
    const wingAlpha = Math.min(0.4, (G.berserkActive?0.3:0) + G.combo*0.02);
    ctx.fillStyle=`rgba(255,200,100,${wingAlpha})`;
    ctx.beginPath();ctx.moveTo(px-10*facing,py-15);
    ctx.quadraticCurveTo(px-28*facing,py-30,px-18*facing,py-5);
    ctx.quadraticCurveTo(px-12*facing,py-12,px-10*facing,py-15);ctx.fill();
    ctx.beginPath();ctx.moveTo(px-12*facing,py-8);
    ctx.quadraticCurveTo(px-30*facing,py-18,px-20*facing,py+5);
    ctx.quadraticCurveTo(px-14*facing,py,px-12*facing,py-8);ctx.fill();
  }

  // 斗篷（漸層）
  const gradCape = ctx.createLinearGradient(px-8*facing,py-5,px-18*facing,py+25);
  gradCape.addColorStop(0,'rgba(30,40,80,0.9)');gradCape.addColorStop(1,'rgba(20,20,50,0.6)');
  ctx.fillStyle=gradCape;
  ctx.beginPath();ctx.moveTo(px-10*facing,py-8);
  ctx.quadraticCurveTo(px-18*facing,py+15,px-8*facing,py+25);
  ctx.quadraticCurveTo(px-3*facing,py+20,px-5*facing,py+8);ctx.fill();

  // 腿部（漸層）
  const gradLeg = ctx.createLinearGradient(px-7,py+8,px-1,py+22);
  gradLeg.addColorStop(0,'#3a3a6a');gradLeg.addColorStop(1,'#1a1a3a');
  ctx.fillStyle=gradLeg;fillRect(px-7,py+8,6,14,gradLeg);
  ctx.fillStyle=gradLeg;fillRect(px+1,py+8,6,14,gradLeg);
  fillRect(px-8,py+20,8,4,'#4a4a6a');fillRect(px,py+20,8,4,'#4a4a6a');

  // 胸甲（金屬漸層）
  const gradArmor = ctx.createLinearGradient(px-13,py-6,px+13,py+16);
  gradArmor.addColorStop(0,'rgba(60,100,180,0.9)');gradArmor.addColorStop(0.5,'rgba(40,70,140,0.95)');gradArmor.addColorStop(1,'rgba(30,50,100,0.8)');
  ctx.fillStyle=gradArmor;
  ctx.beginPath();ctx.ellipse(px,py+5,13,11,0,0,Math.PI*2);ctx.fill();

  // 胸甲高光
  ctx.fillStyle='rgba(150,200,255,0.2)';
  ctx.beginPath();ctx.ellipse(px-2*facing,py+3,8,6,0,0,Math.PI*2);ctx.fill();

  // 頭盔
  ctx.fillStyle='#3a4a7a';
  ctx.beginPath();ctx.arc(px,py-5,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(150,200,255,0.15)';
  ctx.beginPath();ctx.arc(px-2*facing,py-7,6,0,Math.PI*2);ctx.fill();

  // 眼睛（發光）
  setGlow('#66ddff',8);
  ctx.fillStyle='#66ddff';
  ctx.beginPath();ctx.arc(px+3*facing,py-6,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+7*facing,py-5,2,0,Math.PI*2);ctx.fill();
  noGlow();

  // Belt
  fillRect(px-12,py+10,24,3,'#4a3a2a');
  fillRect(px-2,py+9,4,5,'#ddaa44');

  // Shoulder plates
  fillCircle(px-14*facing,py-2,6,'#3a4a7a');
  fillCircle(px+14*facing,py-2,6,'#3a4a7a');

  // Arms
  ctx.save();ctx.translate(px-11,py+2);ctx.rotate(facing>0?-0.3:0.3);
  fillRect(-3,0,5,14,'#2a3a6a');ctx.restore();
  ctx.save();ctx.translate(px+9,py+2);ctx.rotate(facing>0?0.3:-0.3);
  fillRect(-3,0,5,14,'#2a3a6a');ctx.restore();

  // Head
  fillCircle(px,py-12,10,'#3a3a5a');

  // 攻擊範圍指示（微弱圈圈，待命時可見）
  if(!p.isSwinging){
    const rangeR = (p.range+WEAPONS[p.weaponIdx].range)*(p.artifacts.includes('cleave')?1.5:1);
    ctx.strokeStyle='rgba(136,221,255,0.08)';
    ctx.lineWidth=1;
    ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.arc(px,py,rangeR*0.8,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Helmet
  ctx.fillStyle='#4a5a8a';
  ctx.beginPath();ctx.arc(px,py-14,11,Math.PI,0);ctx.fill();

  // Visor glow
  setGlow('#66ddff',8);
  fillRect(px-6,py-15,12,2,'#66ddff');
  noGlow();
  fillRect(px-7,py-16,14,4,'rgba(100,220,255,0.15)');

  // Sword
  drawSword(px,py,facing);

  // Berserk aura
  if(G.berserkActive){
    setGlow('#ff4444',15);
    ctx.strokeStyle='rgba(255,50,50,0.3)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px,py,30+p.swingProg*5,0,Math.PI*2);ctx.stroke();
    noGlow();
  }

  // HP bar
  const hpR=p.hp/p.maxHp;
  fillRect(px-15,py-28,30,4,'rgba(0,0,0,0.5)');
  ctx.fillStyle=hpR>0.5?'#66ff88':hpR>0.25?'#ffcc44':'#ff4444';
  ctx.fillRect(px-14,py-27,28*hpR,2);
}

function drawSword(px,py,facing){
  const p=G.player,wep=WEAPONS[p.weaponIdx];
  const swordLen=40+(wep.range-55)*0.3;

  if(p.isSwinging&&p.swingProg>0){
    const arcAngle=Math.PI*0.8;
    const startA=(-arcAngle/2)*facing+(facing>0?0:Math.PI);
    const endA=(arcAngle/2)*facing+(facing>0?0:Math.PI);
    const curA=startA+(endA-startA)*Math.min(1,p.swingProg*1.5);

    // === 明顯的揮斬弧光 ===
    // 外層大範圍光弧（顯示攻擊範圍）
    setGlow('#88ddff',35);
    ctx.strokeStyle='rgba(136,221,255,0.5)';
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.arc(px,py,swordLen*0.8,startA,curA);
    ctx.stroke();
    noGlow();

    // 內層白色核心弧
    setGlow('#aaddff',20);
    ctx.strokeStyle='rgba(200,230,255,0.7)';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(px,py,swordLen*0.8,startA,curA);
    ctx.stroke();
    noGlow();

    // Blade
    const bx=px+Math.cos(curA)*swordLen*0.3;
    const by=py+Math.sin(curA)*swordLen*0.3;
    const tx=px+Math.cos(curA)*swordLen;
    const ty=py+Math.sin(curA)*swordLen;

    setGlow('#aaddff',12);
    ctx.fillStyle='#8899cc';
    ctx.beginPath();
    ctx.moveTo(bx,by);ctx.lineTo(tx+6,ty);ctx.lineTo(tx-6,ty);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(136,221,255,0.3)';
    ctx.beginPath();
    ctx.moveTo(bx,by);ctx.lineTo(tx+3,ty);ctx.lineTo(tx-3,ty);
    ctx.closePath();ctx.fill();
    noGlow();

    // 斬擊方向粒子
    for(let i=0;i<4;i++){
      const a=curA+rand(-0.3,0.3);
      const dist2=swordLen*(0.4+rand(0,0.5));
      addParticle(px+Math.cos(a)*dist2,py+Math.sin(a)*dist2,
        rand(-1,1)*0.5,rand(-1,1)*0.5,rand(8,15),
        `rgba(136,221,255,${rand(0.3,0.6)})`,rand(2,5));
    }
  } else {
    // Idle on back
    ctx.save();ctx.translate(px-12*facing,py-5);
    ctx.rotate(facing>0?-0.8:0.8);
    fillRect(-2,-swordLen,4,swordLen,'#7788aa');
    fillRect(-6,-5,12,4,'#5566aa');
    ctx.fillStyle='#8899cc';
    ctx.beginPath();ctx.moveTo(-2,-swordLen);
    ctx.lineTo(4,-swordLen+8);ctx.lineTo(-4,-swordLen+8);
    ctx.closePath();ctx.fill();
    ctx.restore();
  }
}

function drawEnemy(e){
  const x=e.x,y=e.y,s=e.size;
  const pulse = Math.sin(e.anim*3)*2;

  // Shadow (soft radial)
  const gradShad = ctx.createRadialGradient(x,y+s*0.8,0,x,y+s*0.8,s*0.7);
  gradShad.addColorStop(0,'rgba(0,0,0,0.25)');gradShad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gradShad;ctx.beginPath();ctx.ellipse(x,y+s*0.8,s*0.7,s*0.2,0,0,Math.PI*2);ctx.fill();

  // Body glow
  if(e.isBoss) setGlow(e.color,30);
  else if(e.isElite) setGlow(e.color,15);
  else if(e.burnTimer>0) setGlow('#ff6600',10);

  // Body shape (radial gradient)
  const gradBody = ctx.createRadialGradient(x-3,y-3,0,x,y,s);
  if(e.isBoss){
    gradBody.addColorStop(0,'rgba(255,150,100,0.9)');gradBody.addColorStop(1,e.color);
  } else if(e.isElite){
    gradBody.addColorStop(0,'rgba(255,200,100,0.8)');gradBody.addColorStop(1,e.color);
  } else if(e.type==='fast'){
    gradBody.addColorStop(0,'rgba(255,220,100,0.8)');gradBody.addColorStop(1,e.color);
  } else if(e.type==='heavy'){
    gradBody.addColorStop(0,'rgba(200,120,255,0.8)');gradBody.addColorStop(1,e.color);
  } else {
    gradBody.addColorStop(0,'rgba(255,150,150,0.7)');gradBody.addColorStop(1,e.color);
  }
  ctx.fillStyle=gradBody;
  ctx.beginPath();
  if(e.isBoss){
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/2;ctx.lineTo(x+Math.cos(a)*s*1.2,y+Math.sin(a)*s*1.2);}
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(80,40,60,0.6)';
    ctx.beginPath();ctx.arc(x-14,y+2,8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+14,y+2,8,0,Math.PI*2);ctx.fill();
  } else if(e.isElite){
    ctx.arc(x,y+1,s*1.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.beginPath();ctx.arc(x-3,y-3,s*0.5,0,Math.PI*2);ctx.fill();
  } else if(e.type==='fast'){
    ctx.ellipse(x,y,s,s*0.6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.beginPath();ctx.ellipse(x-2,y-2,s*0.5,s*0.3,0,0,Math.PI*2);ctx.fill();
  } else if(e.type==='heavy'){
    ctx.arc(x,y+1,s*1.15,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.beginPath();ctx.arc(x-3,y-3,s*0.6,0,Math.PI*2);ctx.fill();
  } else {
    ctx.ellipse(x,y+1,s,s*0.85,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.beginPath();ctx.ellipse(x-2,y-2,s*0.4,s*0.35,0,0,Math.PI*2);ctx.fill();
  }
  noGlow();

  // Boss 王冠
  if(e.isBoss){
    setGlow('#ffcc44',10);
    ctx.fillStyle='#ffcc44';
    ctx.beginPath();
    ctx.moveTo(x-16,y-s-4);ctx.lineTo(x-12,y-s-16);
    ctx.lineTo(x-7,y-s-6);ctx.lineTo(x,y-s-18);
    ctx.lineTo(x+7,y-s-6);ctx.lineTo(x+12,y-s-16);
    ctx.lineTo(x+16,y-s-4);ctx.closePath();ctx.fill();
    fillCircle(x-10,y-s-13,2.5,'#ff4466');
    fillCircle(x,y-s-15,2.5,'#44ff88');
    fillCircle(x+10,y-s-13,2.5,'#ff4466');
    noGlow();
    ctx.fillStyle='#ffcc44';ctx.font='bold 10px Rajdhani,sans-serif';ctx.textAlign='center';
    ctx.fillText('⚔ BOSS ⚔',x,y-s-24);
  } else if(e.isElite){
    setGlow('#ffcc44',8);
    ctx.fillStyle='#ffcc44';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText('★',x,y-s-6);
    noGlow();
    ctx.strokeStyle='rgba(255,200,68,0.15)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(x,y,s*1.5+pulse,0,Math.PI*2);ctx.stroke();
  }

  // Eyes (glowing)
  const eo=s*0.35;
  setGlow(e.isBoss?'#ff4444':'#ffffff',6);
  fillCircle(x-eo+pulse*0.5,y-3,s*0.2,'#ffffff');
  fillCircle(x+eo-pulse*0.5,y-3,s*0.2,'#ffffff');
  noGlow();
  fillCircle(x-eo-2+pulse*0.5,y-2,s*0.07,'#111122');
  fillCircle(x+eo-2-pulse*0.5,y-2,s*0.07,'#111122');

  // Hit flash
  if(e.hitTimer>0){
    ctx.fillStyle=`rgba(255,255,255,${e.hitTimer/15})`;
    ctx.beginPath();ctx.arc(x,y,s*0.5,0,Math.PI*2);ctx.fill();
  }

  // Slow indicator (dashed ring)
  if(e.slowTimer>0){
    ctx.strokeStyle=`rgba(100,200,255,${Math.min(1,e.slowTimer/80)})`;ctx.lineWidth=1.5;
    ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.arc(x,y,s+6+pulse,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Burn spark
  if(e.burnTimer>0&&Math.random()<0.3) addParticle(x+rand(-5,5),y-4,rand(-0.5,0.5),rand(-0.8,0),10,'#ff6600',2,'#ff4400');

  // HP bar (when damaged)
  if(e.hp<e.maxHp){
    const bw2=s*2,hpR2=e.hp/e.maxHp;
    fillRect(x-bw2/2,y-s-10,bw2,3,'rgba(0,0,0,0.6)');
    const hpClr=hpR2>0.5?'#66ff88':hpR2>0.25?'#ffcc44':'#ff4444';
    ctx.fillStyle=hpClr;
    ctx.fillRect(x-bw2/2+1,y-s-9,(bw2-2)*Math.max(0,hpR2),1.5);
  }
}

function drawDrops(){
  for(const d of G.drops){
    const bob=Math.sin(d.bob)*3,alpha=d.life<60?d.life/60:1;
    ctx.globalAlpha=alpha;
    if(d.icon!=='•') setGlow(d.color,10);
    ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d.icon,d.x,d.y+bob);
    noGlow();
    ctx.globalAlpha=1;
  }
}

function drawEnemiesList(){
  const sorted=[...G.enemies].filter(e=>!e.dead).sort((a,b)=>a.y-b.y);
  for(const e of sorted) drawEnemy(e);
}

function drawEffectsList(){
  for(const ef of G.effects){
    const pr=1-ef.life/ef.maxLife;
    const r=ef.radius*(0.5+pr*0.5),alpha=1-pr;
    ctx.globalAlpha=alpha;
    setGlow(ef.color,20);
    ctx.strokeStyle=ef.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(ef.x,ef.y,Math.max(0,r),0,Math.PI*2);ctx.stroke();
    if(ef.fireGround){
      ctx.fillStyle=`rgba(255,68,0,${alpha*0.15})`;
      ctx.beginPath();ctx.arc(ef.x,ef.y,Math.max(0,r),0,Math.PI*2);ctx.fill();
    }
    noGlow();ctx.globalAlpha=1;
  }
}

function drawProjectilesList(){
  for(const pr of G.projectiles){
    setGlow('#4488ff',12);
    fillCircle(pr.x,pr.y,pr.radius*0.4,'#4488ff');
    ctx.fillStyle='rgba(68,136,255,0.2)';
    ctx.beginPath();ctx.arc(pr.x,pr.y,pr.radius,0,Math.PI*2);ctx.fill();
    noGlow();
  }
}

function drawDamageNumbers(){
  for(const dn of G.dmgNumbers){
    const alpha=dn.life/25;
    ctx.fillStyle=`rgba(255,204,68,${alpha})`;
    ctx.font='bold 14px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(dn.txt,dn.x,dn.y);
    // 外發光
    setGlow(`rgba(255,204,68,${alpha*0.3})`,8);
    ctx.fillText(dn.txt,dn.x,dn.y);
    noGlow();
  }
}

function drawUI(){
  const p=G.player,wep=WEAPONS[p.weaponIdx];

  // ── Top info bar ──
  fillRect(0,0,GW,28,'rgba(0,0,0,0.7)');
  ctx.fillStyle='#ccddff';ctx.font='12px Rajdhani,sans-serif';ctx.textBaseline='middle';
  ctx.textAlign='left';
  const pm=G.pathMods||{};
  const hiddenMark = G.hiddenRun ? '🌟 ' : '';
  ctx.fillStyle='#88aaff';
  ctx.fillText(`第${G.stage}關`,10,14);
  ctx.fillStyle='#ff8866';
  ctx.fillText(`殘敵 ${G.enemies.filter(e=>!e.dead).length}/${G.stageMaxEnemy}`,100,14);
  ctx.fillStyle='#8899bb';
  ctx.fillText(hiddenMark+pm._name||'',220,14);
  ctx.textAlign='center';
  ctx.fillStyle='#ffdd88';
  ctx.fillText(`分數 ${G.score}`,390,14);
  ctx.fillStyle='#ffcc44';
  ctx.fillText(`💰 ${G.gold}`,490,14);
  ctx.fillStyle='#88dd88';
  ctx.fillText(`擊殺 ${G.kills}`,580,14);
  ctx.textAlign='right';
  ctx.fillStyle=rarityColor(wep.r);
  ctx.fillText(`⚔️ ${wep.name}`,GW-10,14);

  // ── Bottom HUD ──
  fillRect(0,PLAY_H,GW,GH-PLAY_H,'rgba(8,12,28,0.92)');
  fillRect(0,PLAY_H,GW,1,'rgba(100,150,255,0.15)');

  // HP bar
  const hpY=PLAY_H+5;
  const hpRatio=Math.max(0,p.hp/p.maxHp);
  const hpClr=hpRatio>0.5?'#66dd88':hpRatio>0.25?'#ffcc44':'#ff4444';
  fillRect(12,hpY,GW-24,10,'rgba(0,0,0,0.4)');
  fillRect(12,hpY,(GW-24)*hpRatio,10,hpClr);
  ctx.fillStyle='#fff';ctx.font='9px Rajdhani,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(`HP ${Math.ceil(p.hp)}/${Math.ceil(p.maxHp)}`,GW/2,hpY+5);

  // Stats row
  const stY=PLAY_H+22;
  ctx.font='11px Rajdhani,sans-serif';ctx.textBaseline='middle';
  ctx.textAlign='left';
  ctx.fillStyle='#ff8866'; ctx.fillText(`⚔️ ${Math.floor(p.atk)}`,14,stY);
  ctx.fillStyle='#6688ff'; ctx.fillText(`🛡️ ${Math.floor(p.def)}`,110,stY);
  ctx.fillStyle='#66ddff'; ctx.fillText(`💨 ${p.spd.toFixed(1)}`,200,stY);
  ctx.textAlign='right';
  ctx.fillStyle='#ffcc44'; ctx.fillText(`💰 ${G.gold}`,GW-14,stY);
  ctx.fillStyle='#cc66ff'; ctx.fillText(`💜 ${G.souls}`,GW-110,stY);
  ctx.textAlign='left'; ctx.fillStyle='#88dd88'; ctx.fillText(`🏆 ${G.score}`,GW-210,stY);

  // Equipment row
  const eqY=PLAY_H+40;
  const tOrder=['helmet','chestplate','greaves','gauntlets','boots'];
  const tIcons={'helmet':'⛑️','chestplate':'🛡️','greaves':'👢','gauntlets':'🧤','boots':'👟'};
  ctx.font='10px Rajdhani,sans-serif';
  for(let i=0;i<tOrder.length;i++){
    const t=tOrder[i],eq=p.equips[t];
    const ex=14+i*Math.floor((GW-28)/5);
    ctx.fillStyle=eq?rarityColor(eq.rarity):'#2a3a4a';
    ctx.fillText(`${tIcons[t]}${eq?eq.name.substring(0,5):'空'}`,ex,eqY);
  }

  // Skills (moved into HUD)
  const skY=PLAY_H+60;
  for(let i=0;i<SKILLS.length;i++){
    const sk=SKILLS[i],has=p.skills.includes(sk.id),cd=p.skillTimers[sk.id]||0,ready=has&&cd<=0;
    const bx=14+i*40;
    ctx.fillStyle=has?'rgba(40,60,110,0.7)':'rgba(15,18,30,0.5)';
    fillRect(bx,skY-8,24,24,'');
    ctx.fillStyle=ctx.fillStyle; ctx.fillRect(bx,skY-8,24,24);
    ctx.strokeStyle=ready?'#66aaff':has?'#3a5588':'#223344';ctx.lineWidth=1;
    ctx.strokeRect(bx,skY-8,24,24);
    if(has){
      ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=ready?'#ccddff':'#556688';
      ctx.fillText(sk.icon,bx+12,skY+4);
      if(!ready){
        fillRect(bx,skY-8,24,24,'rgba(0,0,0,0.5)');
        ctx.fillStyle='#88aadd';ctx.font='9px sans-serif';
        ctx.fillText(Math.ceil(cd/60),bx+12,skY+4);
      }
    } else {
      ctx.fillStyle='#334455';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('?',bx+12,skY+4);
    }
  }

  // Artifacts
  for(let i=0;i<Math.min(p.artifacts.length,10);i++){
    const art=ARTIFACTS.find(a=>a.id===p.artifacts[i]);
    if(art){ctx.font='13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(art.icon,14+i*26,PLAY_H+92);}
  }

  // Combo / Berserk overlay (above all UI)
  if(G.combo>2){
    ctx.fillStyle='#ff8844';ctx.font='bold 14px Rajdhani,sans-serif';ctx.textAlign='center';
    ctx.fillText(`🔥 ${G.combo} 連擊!`,GW/2,50);
  }
  if(G.berserkActive&&Math.sin(G.totalTime*0.2)>0){
    ctx.fillStyle='#ff4444';ctx.font='bold 13px Rajdhani,sans-serif';ctx.textAlign='center';
    ctx.fillText('⚡ 狂暴模式 ⚡',GW/2,38);
  }
}

// ─── MAIN RENDER ────────────────────────────────────────────────────────────

function render(){
  if(G.screen==='title'){ drawTitleScreen(); return; }

  drawBackground();
  drawGuardianSword();
  drawDrops();
  drawEnemiesList();
  drawProjectilesList();
  drawPlayer();
  drawEffectsList();
  drawDamageNumbers();

  // 關卡通知（overlay 效果）
  if(G.stageNotify>0){
    const alpha = G.stageNotify>50 ? 1 : G.stageNotify/50;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle='#ffdd88';ctx.font='bold 48px Cinzel,serif';ctx.textAlign='center';ctx.textBaseline='middle';
    const scale = G.stageNotify>50 ? 0.9 + (60-G.stageNotify)/60*0.1 : 1;
    ctx.translate(GW/2,GH/2);
    ctx.scale(scale,scale);
    ctx.shadowColor='rgba(255,200,80,0.5)';ctx.shadowBlur=40;
    ctx.fillText('第 '+G.stage+' 關',0,-10);
    ctx.font='18px Rajdhani,sans-serif';
    ctx.fillStyle='#aabbdd';
    ctx.shadowBlur=0;
    ctx.fillText('Stage '+G.stage,0,30);
    ctx.restore();
  }

  drawUI();
}

function drawTitleScreen(){
  G.totalTime++;
  fillRect(0,0,GW,GH,'#0a0a1a');
  for(let i=0;i<50;i++){
    const x=(Math.sin(i*137.5+G.totalTime*0.008)*0.5+0.5)*GW;
    const y=(Math.cos(i*97.3+G.totalTime*0.006)*0.5+0.5)*GH;
    ctx.fillStyle=`rgba(100,150,255,${0.08+Math.sin(G.totalTime*0.02+i)*0.04})`;
    ctx.beginPath();ctx.arc(x,y,rand(1,3),0,Math.PI*2);ctx.fill();
  }

  setGlow('#8866ff',50);
  ctx.fillStyle='#c8a0ff';ctx.font='bold 48px Cinzel,serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('巨劍守護',GW/2,155);
  noGlow();

  ctx.fillStyle='#8899bb';ctx.font='17px Rajdhani,sans-serif';
  ctx.fillText('Guardian Blade',GW/2,195);

  // Decorative swords
  ctx.strokeStyle='rgba(136,170,255,0.3)';ctx.lineWidth=2;
  for(let i=0;i<2;i++){const sx=i===0?120:GW-120;ctx.beginPath();ctx.moveTo(sx,115);ctx.lineTo(sx,145);ctx.moveTo(sx-10,128);ctx.lineTo(sx+10,128);ctx.moveTo(sx-6,145);ctx.lineTo(sx+6,145);ctx.stroke();}

  ctx.fillStyle='#556688';ctx.font='13px Rajdhani,sans-serif';
  ctx.fillText('自動揮劍 · 橫向無雙',GW/2,235);
  ctx.fillStyle='#445566';ctx.font='12px Rajdhani,sans-serif';
  ctx.fillText(`靈魂碎片: ${G.souls}  |  累計金幣: ${G.gold}`,GW/2,260);
}

// ─── OVERLAY UI ─────────────────────────────────────────────────────────────

function showOverlay(type){
  G.showOverlay=true;
  let html='';
  switch(type){
    case 'title': html=titleOverlayHTML(); break;
    case 'gameover': html=gameOverHTML(); break;
    case 'pause': html=pauseHTML(); break;
    case 'pathselect': html=pathSelectHTML(); break;
    case 'runresult': html=runResultHTML(); break;
    case 'perm': html=permUpgradeHTML(); break;
    case 'equip': html=equipManageHTML(); break;
    case 'help': html=helpHTML(); break;
    case '': html=''; G.showOverlay=false; break;
  }
  OV.innerHTML=`<div class="screen-overlay">${html}</div>`;
}

function titleOverlayHTML(){
  const tr=G.permUpgrades.totalRuns||0;
  const bs=G.permUpgrades.bestStage||0;
  const eqCount = G.collection?.equips?.length||0;
  const stats=tr>0?`<div style="margin-top:12px;color:#8899bb;font-size:12px">
    <p>總遊玩次數: ${tr} 次  |  最佳進度: 第${bs}關  |  收藏裝備: ${eqCount}件</p>
  </div>`:'';
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;pointer-events:auto">
    <div class="title">巨劍守護</div>
    <div class="subtitle">Guardian Blade</div>
    <button class="btn btn-primary" onclick="startGame()">⚔️ 開始遊戲</button>
    <button class="btn" onclick="showOverlay('perm')">💜 靈魂強化</button>
    <button class="btn" onclick="showOverlay('equip')">🛡️ 裝備管理</button>
    <button class="btn" onclick="showOverlay('help')">📖 操作說明</button>
    ${stats}
    <div style="margin-top:${tr>0?'8':'24'}px;color:#445566;font-size:11px;text-align:center">
      滑鼠移動角色 · 自動揮劍<br>選擇路線，守護巨劍!
    </div>
  </div>`;
}

function gameOverHTML(){
  const runs = G.totalRuns || 0;
  return `<div class="modal-box" style="text-align:center">
    <h2 style="color:#ff4444">💔 旅途結束</h2>
    <p style="color:#ccddff">守護劍已碎裂，冒險告一段落</p>
    <div style="margin:16px 0">
      <p style="color:#8899bb">完成局數: ${runs} 局</p>
      <p style="color:#8899bb">擊殺: ${G.kills}  |  最大連擊: ${G.maxCombo}</p>
      <p style="color:#ffcc44">💰 ${G.gold}  |  💜 ${G.souls}</p>
    </div>
    <button class="btn btn-primary" onclick="startGame()">🔄 再次出發</button>
    <button class="btn" onclick="backToTitle()">🏠 回到標題</button>
  </div>`;
}

// ─── 分歧路線選擇 ─────────────────────────────────────────────────────────────

function pathSelectHTML(){
  let cards='';
  for(const p of G.pathChoices){
    const bar='⬜'.repeat(p.danger)+'⬜'.repeat(5-p.danger);
    const isHidden = p.hidden;
    const cls = 'choice-card' + (isHidden ? ' choice-card-hidden' : '');
    const nmColor = p.danger>3?'#ff6644':p.danger>2?'#ffcc44':'#66ff88';
    const hiddenBadge = isHidden ? '<div style="font-size:10px;color:#ffcc44;margin-top:2px">🌟 隱藏路線</div>' : '';
    cards+=`<div class="${cls}" onclick="pickPath('${p.id}')">
      <div class="icon">${p.icon}</div>
      <div class="cname" style="color:${nmColor}">${p.name}</div>
      <div class="cdesc">${p.desc}</div>
      ${hiddenBadge}
      <div class="cdesc" style="color:#445566;font-size:10px">難度 ${bar}</div>
    </div>`;
  }
  const runs=G.totalRuns||0;
  return `<div class="modal-box" style="max-width:550px">
    <h2>${runs>0?'🗺️ 下一條路':'🗺️ 選擇你的路線'}</h2>
    <p style="text-align:center;color:#8899bb;font-size:12px">${runs>0?'已完成 '+runs+' 局':'初入守護遺跡'}</p>
    <div class="choice-grid" style="grid-template-columns:repeat(${Math.min(G.pathChoices.length,3)},1fr)">${cards}</div>
    <div style="text-align:center;margin-top:10px">
      <button class="btn btn-small" onclick="gameOver()" style="font-size:12px;padding:6px 16px">🏁 結束旅程</button>
    </div>`;
}
// ─── 結算畫面 ──────────────────────────────────────────────────────────────────

function runResultHTML(){
  const pm=G.pathMods||{};
  const bestStage = G.permUpgrades.bestStage||0;
  return `<div class="modal-box" style="text-align:center">
    <h2>⚔️ ${G.totalRuns>1?'第 '+G.totalRuns+' 局 達成':'首局完成'}</h2>
    <p style="color:#8899bb;font-size:13px">路線: ${pm._name||'未知'}  |  推進到第 ${G.stage} 關</p>
    <div style="margin:14px 0">
      <p style="color:#ffcc44">💰 金幣 +${G.roundGold}</p>
      <p style="color:#cc66ff">💜 靈魂 +${G.roundSouls}</p>
      <p style="color:#88ddff">擊殺 ${G.kills}  |  連擊 ${G.maxCombo}  |  最佳紀錄: 第${bestStage}關</p>
    </div>
    <button class="btn btn-primary" onclick="nextRun()">⚡ 快速下一局</button>
    <button class="btn" onclick="showPathSelect()" style="margin-top:4px">🗺️ 選擇路線</button>
    <button class="btn btn-small" onclick="showOverlay('equip')" style="margin-top:4px">🛡️ 裝備管理</button>
    <button class="btn" onclick="gameOver()" style="margin-top:4px">🏁 結束旅程</button>
  </div>`;
}

// ─── 暫停畫面 ─────────────────────────────────────────────────────────────────

function togglePause(){
  if(!G.runActive && G.runPhase!=='playing' && G.runPhase!=='path') return;
  if(G.showOverlay && G.runPhase==='playing' && G.runActive){
    // 關閉暫停，繼續遊戲
    G.showOverlay=false;
    OV.innerHTML='';
    return;
  }
  if(!G.showOverlay && G.runActive){
    showOverlay('pause');
  }
}

function pauseHTML(){
  const p=G.player;
  const artNames = p.artifacts.map(id=>{const a=ARTIFACTS.find(x=>x.id===id);return a?a.icon+' '+a.name:id;}).join(', ')||'無';
  const wep = WEAPONS[p.weaponIdx];
  const pm=G.pathMods||{};
  return `<div class="modal-box" style="text-align:center">
    <h2>⏸️ 暫停</h2>
    <div style="margin:12px 0;color:#8899bb;font-size:13px">
      <p>路線: ${pm._name||'選擇中'}  |  計時: ${Math.floor(G.runTimer/60)}s</p>
      <p>⚔️ ${wep.name}  |  💰 ${G.gold}  |  💜 ${G.souls}</p>
      <p style="font-size:11px;color:#667788">聖物: ${artNames}</p>
    </div>
    <button class="btn btn-primary" onclick="togglePause()">▶️ 繼續遊戲</button>
    <button class="btn" onclick="gameOver()" style="margin-top:4px">🏁 結束旅程（回標題）</button>
  </div>`;
}

function permUpgradeHTML(){
  let html=`<div class="modal-box" style="max-width:700px;max-height:80vh"><h2>💜 靈魂強化</h2><p style="text-align:center;color:#cc66ff">靈魂碎片: ${G.souls}</p><div class="upgrade-grid">`;
  for(const pu of PERM_UPGRADES){
    const cur=G.permUpgrades[pu.id]||0,maxed=cur>=pu.max;
    const cost=maxed?'MAX':pu.costs[cur]||'∞';
    const aff=!maxed&&G.souls>=cost;
    html+=`<div class="upgrade-card"><div class="uname">${pu.name}</div><div class="ulevel">Lv.${cur}/${pu.max}</div><div class="ucost">${pu.desc}</div><div style="margin-top:4px"><span class="ucost">${maxed?'已滿級':cost+'碎片'}</span>${maxed?'':`<button class="btn btn-small ${aff?'btn-primary':'btn-disabled'}" style="margin-left:6px" onclick="${aff?`buyPerm('${pu.id}')`:''}">${aff?'升級':'不足'}</button>`}</div></div>`;
  }
  html+=`</div><button class="btn btn-primary" onclick="closeOverlay()">返回</button></div>`;
  return html;
}

function equipManageHTML(){
  const col = G.collection?.equips||[];
  const types = ['helmet','chestplate','greaves','gauntlets','boots'];
  const typeNames = {helmet:'頭盔',chestplate:'胸甲',greaves:'護腿',gauntlets:'手套',boots:'靴子'};
  let html = '<div class="modal-box" style="max-width:650px"><h2>🛡️ 裝備管理</h2>';
  if(col.length===0){
    html += '<p style="text-align:center;color:#667788">尚無收藏裝備，擊殺菁英怪可獲得</p>';
  } else {
    for(const type of types){
      const items = col.filter(e=>e.type===type).sort((a,b)=>b.rarity-a.rarity);
      if(items.length===0) continue;
      html += `<p style="color:#8899bb;font-size:13px;margin:8px 0 4px;border-bottom:1px solid #223344;padding-bottom:4px">${typeNames[type]}</p><div class="equip-grid" style="grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">`;
      for(const eq of items){
        const equipped = G.player.equips[type]?.id===eq.id;
        const stars = '★'.repeat(eq.rarity)+'☆'.repeat(5-eq.rarity);
        const curseInfo = eq.curseDesc ? `<div class="ecurse">${eq.curseDesc}</div>` : '';
        const stats = [];
        if(eq.hp) stats.push('HP+'+eq.hp);
        if(eq.def) stats.push('DEF+'+eq.def);
        if(eq.spd) stats.push('SPD+'+(eq.spd*100)+'%');
        if(eq.atk) stats.push('ATK+'+(eq.atk>0?'+'+eq.atk:eq.atk));
        if(eq.goldMult) stats.push('金幣'+(eq.goldMult>0?'+'+Math.floor(eq.goldMult*100)+'%':Math.floor(eq.goldMult*100)+'%'));
        html += `<div class="equip-card" onclick="${equipped?'':'equipItem(\''+eq.id+'\')'}">
          <div class="ename" style="color:${rarityColor(eq.rarity)}">${equipped?'✔ ':''}${eq.name}</div>
          <div style="color:${rarityColor(eq.rarity)};font-size:10px">${stars}</div>
          <div class="estats">${stats.join(' ')}</div>
          ${curseInfo}
        </div>`;
      }
      html += '</div>';
    }
  }
  html += `<div style="text-align:center;margin-top:12px"><button class="btn btn-primary" onclick="closeOverlay()">返回</button></div></div>`;
  return html;
}

function equipItem(id){
  const col = G.collection?.equips||[];
  const eq = col.find(e=>e.id===id);
  if(!eq) return;
  G.player.equips[eq.type]=eq;
  recalcStats();
  showOverlay('equip');
}

function helpHTML(){
  return `<div class="modal-box" style="max-width:500px"><h2>📖 遊戲說明</h2><p style="color:#8899bb;line-height:1.8;font-size:13px">🖱️ <b>移動</b>：滑鼠/手指追蹤角色<br>⚔️ <b>戰鬥</b>：靠近敵人自動揮劍<br>💎 <b>收集</b>：掉落物自動飛向玩家<br><br>🗺️ <b>分歧路線</b>：每局結束後選擇下一條路<br>💰 財富之路=金幣x2 但敵人變強<br>💎 寶物之路=掉落率x2 菁英大增<br>👹 獸潮之路=敵人超多但血量減半<br>👑 挑戰之路=Boss關 靈魂x3<br>⚖️ 均衡之路=標準難度<br><br>🛡️ <b>守護巨劍</b>不被破壞<br>💜 靈魂碎片用於永久強化<br>🔄 聖物之間有組合效果</p><button class="btn btn-primary" onclick="closeOverlay()">返回</button></div>`;
}

// ─── OVERLAY CALLBACKS ──────────────────────────────────────────────────────

function closeOverlay(){
  G.showOverlay=false;
  OV.innerHTML='';
  if(G.screen==='gameover'||G.screen==='title'){
    if(G.screen==='title') showOverlay('title');
    return;
  }
}

// ─── 分歧路線回調 ──────────────────────────────────────────────────────────────

function pickPath(id){
  let path = RUN_PATHS.find(p=>p.id===id) || HIDDEN_PATHS.find(p=>p.id===id);
  if(!path) return;
  G.pathMods = {...path.mods, _id:path.id, _name:path.name};
  G.hiddenRun = !!path.hidden;
  G.showOverlay=false;
  OV.innerHTML='';
  startRun();
}

function buyPerm(id){
  const pu=PERM_UPGRADES.find(p=>p.id===id);
  if(!pu) return;
  const cur=G.permUpgrades[id]||0;
  if(cur>=pu.max) return;
  const cost=pu.costs[cur];
  if(G.souls<cost) return;
  G.souls-=cost;
  G.permUpgrades[id]=cur+1;
  saveGame();
  addEffect(GW/2,GH/2,40,'#cc66ff',20);
  showOverlay('perm');
}

// ─── START / TITLE ─────────────────────────────────────────────────────────

function startGame(){
  initGame();
  G.showOverlay=false;
  OV.innerHTML='';
}

function backToTitle(){
  G.screen='title';
  G.showOverlay=false;
  OV.innerHTML='';
  showOverlay('title');
}

// ─── GAME LOOP ──────────────────────────────────────────────────────────────

function gameLoop(timestamp){
  const dt=G.lastTime?Math.min((timestamp-G.lastTime)/16.667,3):1;
  G.lastTime=timestamp;
  G.dt=dt;

  if(G.screen==='title'){render();requestAnimationFrame(gameLoop);return;}
  if(G.screen==='gameover'){render();requestAnimationFrame(gameLoop);return;}

  if(G.screen==='playing'&&!G.showOverlay) update();

  render();
  requestAnimationFrame(gameLoop);
}

// ─── EVENTS ─────────────────────────────────────────────────────────────────

CANVAS.addEventListener('mousemove',e=>{
  const r=CANVAS.getBoundingClientRect();
  const sx=GW/r.width,sy=GH/r.height;
  G.mouseX=clamp((e.clientX-r.left)*sx,0,GW);
  G.mouseY=clamp((e.clientY-r.top)*sy,0,PLAY_H);
});

CANVAS.addEventListener('mousedown',e=>{
  e.preventDefault();
  G.mouseDown=true;
  const r=CANVAS.getBoundingClientRect();
  const sx=GW/r.width,sy=GH/r.height;
  G.mouseX=clamp((e.clientX-r.left)*sx,0,GW);
  G.mouseY=clamp((e.clientY-r.top)*sy,0,PLAY_H);
  if(G.screen==='playing'&&!G.showOverlay) playerSwing();
});
CANVAS.addEventListener('mouseup',()=>{G.mouseDown=false;});

CANVAS.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];G.touchId=t.identifier;
  const r=CANVAS.getBoundingClientRect();
  const sx=GW/r.width,sy=GH/r.height;
  G.mouseX=clamp((t.clientX-r.left)*sx,0,GW);
  G.mouseY=clamp((t.clientY-r.top)*sy,0,PLAY_H);
  if(G.screen==='playing'&&!G.showOverlay) playerSwing();
},{passive:false});

CANVAS.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===G.touchId){
      const r=CANVAS.getBoundingClientRect();
      const sx=GW/r.width,sy=GH/r.height;
      G.mouseX=clamp((t.clientX-r.left)*sx,0,GW);
      G.mouseY=clamp((t.clientY-r.top)*sy,0,PLAY_H);
    }
  }
},{passive:false});

CANVAS.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){if(t.identifier===G.touchId)G.touchId=null;}
});

document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){
    e.preventDefault();
    if(G.screen==='title')startGame();
    else if(G.screen==='gameover')startGame();
    else if(G.screen==='playing'&&!G.showOverlay) playerSwing();
  }
  if(e.key==='Escape'){
    if(G.showOverlay && G.runPhase==='playing'){closeOverlay();}
    else if(!G.showOverlay && G.runActive && G.runPhase==='playing'){togglePause();}
    else if(G.showOverlay && G.screen==='gameover'){G.showOverlay=false;OV.innerHTML='';backToTitle();}
    else if(G.showOverlay && (G.runPhase==='path'||G.runPhase==='result')){closeOverlay();}
  }
});

// ─── BOOT ───────────────────────────────────────────────────────────────────

// 頂層錯誤處理：任何 JS 錯誤都會顯示在 canvas 上
window.addEventListener('error', function(e){
  const c = document.getElementById('gameCanvas');
  if(c){
    const cx = c.getContext('2d');
    cx.fillStyle='#0a0a12'; cx.fillRect(0,0,c.width,c.height);
    cx.fillStyle='#ff4444'; cx.font='14px monospace'; cx.textAlign='left';
    cx.fillText('⚡ 執行錯誤: '+e.message, 20, 40);
    cx.fillStyle='#8899bb'; cx.font='12px monospace';
    cx.fillText('請截圖這個畫面回報', 20, 70);
  }
  console.error(e);
});
window.addEventListener('unhandledrejection', function(e){
  console.error('Unhandled Promise:', e.reason);
});

// 保險：如果 3 秒後 canvas 沒更新，顯示提示
let bootTimer = setTimeout(function(){
  const c = document.getElementById('gameCanvas');
  if(c && c.getContext){
    const cx = c.getContext('2d');
    // 只在 canvas 還是全黑時顯示
    cx.fillStyle='#0a0a12'; cx.fillRect(0,0,c.width,c.height);
    cx.fillStyle='#8899bb'; cx.font='16px Rajdhani,sans-serif'; cx.textAlign='center';
    cx.fillText('載入中⋯', c.width/2, c.height/2-20);
    cx.fillStyle='#556688'; cx.font='12px Rajdhani,sans-serif';
    cx.fillText('如果畫面持續不動，請重新整理', c.width/2, c.height/2+10);
  }
}, 3000);

try {
  loadGame();
  G.screen='title';
  showOverlay('title');
  clearTimeout(bootTimer);
} catch(e){
  console.error('Boot error:', e);
  const c = document.getElementById('gameCanvas');
  if(c){
    const cx = c.getContext('2d');
    cx.fillStyle='#0a0a12'; cx.fillRect(0,0,c.width,c.height);
    cx.fillStyle='#ff4444'; cx.font='14px monospace'; cx.textAlign='left';
    cx.fillText('啟動失敗: '+e.message, 20, 40);
  }
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
