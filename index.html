function genEquip(type,rarity){
  const base = ARMOR_STATS[type];
  const mult = [0,1,1.5,2.2,3.2,4.5][rarity]||1;
  return {
    id: type+'_'+rarity, name: RARITY_NAMES[rarity]+ARMOR_NAMES[type],
    type: type, rarity: rarity, hp: Math.floor(base.hp*mult), def: Math.floor(base.def*mult)
  };
}
function randomEquip(){
  const r = Math.random();

// ─── SAVE SYSTEM ────────────────────────────────────────────────────────────

function saveGame(){
  try {
    localStorage.setItem('guardian_blade_save', JSON.stringify({
      permUpgrades: G.permUpgrades, souls: G.souls, gold: G.gold
    }));
  } catch(e){}
}
function loadGame(){
  try {
    const raw = localStorage.getItem('guardian_blade_save');
    if(raw){
      const d = JSON.parse(raw);
      G.permUpgrades = d.permUpgrades||{};
      G.souls = d.souls||0;
      G.gold = d.gold||100;
    }
  } catch(e){}
}

// ─── UTILITY ────────────────────────────────────────────────────────────────

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function rand(mn,mx){return Math.random()*(mx-mn)+mn;}
function randInt(mn,mx){return Math.floor(rand(mn,mx+1));}
function rndItem(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=randInt(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function rarityColor(r){return RARITY_COLORS[r]||'#aabbcc';}
function rarityName(r){return RARITY_NAMES[r]||'';}

function fillRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function fillCircle(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function drawLine(x1,y1,x2,y2,c,w){ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
function setGlow(c,b){ctx.shadowColor=c;ctx.shadowBlur=b||20;}
function noGlow(){ctx.shadowBlur=0;}

// ─── PARTICLES & EFFECTS ────────────────────────────────────────────────────

function addParticle(x,y,vx,vy,life,color,size,gc){
  G.particles.push({x,y,vx,vy,life,maxLife:life,color,size:size||3,glowColor:gc||color});
}
function addSparks(x,y,n,color,speed){
  for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),sp=rand(1,speed||4);addParticle(x,y,Math.cos(a)*sp,Math.sin(a)*sp,rand(15,35),color,rand(2,4),color);}
}
function addEffect(x,y,radius,color,life){
  G.effects.push({x,y,radius,maxRadius:radius,life:life||30,maxLife:life||30,color});
}
function addExplosion(x,y,radius,color){
  addEffect(x,y,radius,color,20);addSparks(x,y,20,color,6);
}

// ─── ENEMY FACTORY ──────────────────────────────────────────────────────────

function createEnemy(type,waveNum){
  const scale = 1 + (waveNum-1)*0.08;
  const e = {
    x:GW+50,y:rand(60,GH-60),type,
    hp:10,maxHp:10,speed:0.6,dmg:1,size:14,
    color:'#dd4444',eyeColor:'#ffffff',
    value:5,gold:rand(1,3),soulChance:0.03,
    hitTimer:0,slowTimer:0,burnTimer:0,burnDmg:0,shockTimer:0,
    dead:false,anim:rand(0,Math.PI*2),isElite:false,isBoss:false
  };
  switch(type){
    case 'normal':
      e.hp=Math.floor(10*scale);e.maxHp=e.hp;
      e.speed=0.5+waveNum*0.015;e.dmg=1;
      e.color='#dd4444';e.size=14;e.value=5;
      e.gold=rand(1,3);e.soulChance=0.03;break;
    case 'fast':
      e.hp=Math.floor(6*scale);e.maxHp=e.hp;
      e.speed=1.1+waveNum*0.02;e.dmg=1;
      e.color='#ddcc44';e.size=10;e.value=7;
      e.gold=rand(1,2);e.soulChance=0.04;break;
    case 'heavy':
      e.hp=Math.floor(30*scale);e.maxHp=e.hp;
      e.speed=0.3+waveNum*0.01;e.dmg=3;
      e.color='#aa44dd';e.size=20;e.value=12;
      e.gold=rand(3,6);e.soulChance=0.06;break;
    case 'elite':
      e.hp=Math.floor(50*scale);e.maxHp=e.hp;
      e.speed=0.5+waveNum*0.015;e.dmg=2;
      e.color='#ddaa33';e.size=18;e.value=25;
      e.gold=rand(8,15);e.soulChance=0.15;e.isElite=true;break;
    case 'boss':
      e.hp=Math.floor(200*scale);e.maxHp=e.hp;
      e.speed=0.35+waveNum*0.01;e.dmg=5;
      e.color='#cc2244';e.size=32;e.value=100;
      e.gold=rand(30,60);e.soulChance=0.5;e.isBoss=true;break;
  }
  return e;
}

// ─── DROP SYSTEM ────────────────────────────────────────────────────────────

function createDrop(x,y,item){
  return {
    x,y,vx:rand(-1,1),vy:rand(-1,1),life:600,bob:rand(0,Math.PI*2),
    item,collected:false,size:8,
    icon: item.type==='gold'?'💰':item.type==='soul'?'💜':item.type==='weapon'?'🗡️':item.type==='equip'?'🛡️':item.type==='skill'?'📜':item.type==='artifact'?'💎':'•',
    color: item.type==='gold'?'#ffcc44':item.type==='soul'?'#cc66ff':item.type==='weapon'?'#4488ff':item.type==='equip'?'#44dd88':item.type==='skill'?'#ff66aa':item.type==='artifact'?'#ffaa44':'#ffffff'
  };
}

function spawnDrops(x,y,count){
  for(let i=0;i<count;i++){
    const r=Math.random();
    let item;
    if(r<0.40) item={type:'gold',val:randInt(1,3+Math.floor(G.wave/3))};
    else if(r<0.70) item={type:'gold',val:randInt(2,5+Math.floor(G.wave/4))};
    else if(r<0.80) item={type:'soul',val:1};
    else if(r<0.85 && G.player.weaponIdx<WEAPONS.length-1 && Math.random()<0.3) item={type:'weapon',id:WEAPONS[G.player.weaponIdx+1].id};
    else if(r<0.90) item={type:'equip',data:randomEquip()};
    else if(r<0.95) {const s=rndItem(SKILLS);item={type:'skill',id:s.id};}
    else {const a=rndItem(ARTIFACTS);item={type:'artifact',id:a.id};}
    if(item) G.drops.push(createDrop(x+rand(-15,15),y+rand(-15,15),item));
  }
}

function forceDrop(x,y,type){
  let item;
  switch(type){
    case 'soul': item={type:'soul',val:1}; break;
    case 'artifact': {const a=rndItem(ARTIFACTS);item={type:'artifact',id:a.id};} break;
    case 'weapon': if(G.player.weaponIdx<WEAPONS.length-1 && Math.random()<0.5) item={type:'weapon',id:WEAPONS[G.player.weaponIdx+1].id}; else item={type:'gold',val:10}; break;
    default: item={type:'gold',val:5};
  }
  if(item) G.drops.push(createDrop(x+rand(-10,10),y+rand(-10,10),item));
}

// ─── RUN SYSTEM（分歧路線 + 密集割草）────────────────────────────────────────

function showPathSelect(){
  G.runPhase='path';
  // 選 3 條路線（隨機排序後取前 3）
  const shuffled = shuffle([...RUN_PATHS]);
  G.pathChoices = shuffled.slice(0,3);
  // 若總局數 > 2 則 boss 路線必出現一次
  if(G.totalRuns>0 && G.totalRuns%3===0 && !G.pathChoices.find(p=>p.id==='boss')){
    G.pathChoices[0]=RUN_PATHS.find(p=>p.id==='boss');
  }
  showOverlay('pathselect');
}

function startRun(){
  G.runActive=true;
  G.runPhase='playing';
  G.runTimer=0;
  G.wave=0;
  G.roundSouls=0;
  G.roundGold=0;
  G.midChoiceTimer=0;
  G.midChoiceMade=false;
  G.combo=0;
  // 新局恢復守護劍HP
  G.guardian.hp = G.guardian.maxHp;
  G.guardian.shieldBlock = G.player.artifacts.includes('shield')?1:0;
  G.waveState='spawning';
  G.waveEnemies=0;
  G.waveMax=9999; // 連續出生
  G.waveTimer=0;
  // 選擇地形
  const tids = shuffle(TERRAINS.map(t=>t.id));
  const cur = TERRAINS.find(t=>t.id===G.terrain?.id);
  G.terrain = TERRAINS.find(t=>t.id!==(cur?cur.id:''));
  // 重置敵人
  G.enemies=[];
  showOverlay(''); // 關閉路線選擇 overlay
  G.showOverlay=false;
  OV.innerHTML='';
}

function updateSpawning(){
  // 連續密集出生
  G.waveTimer+=G.dt;
  const mod = G.pathMods || {};
  const spd = mod.spawnRate || 1;
  // 隨著時間增加出生速度（越來越密）
  const accel = 1 + Math.floor(G.runTimer/1800); // 每 30 秒加速
  const iv = Math.max(4, Math.floor((20 - G.runTimer/300) / spd / accel));
  if(G.waveTimer>=iv){
    G.waveTimer=0;
    G.wave++;
    spawnRunEnemies(mod);
  }
}

function spawnRunEnemies(mod){
  // 每批 3~8 隻密集出生
  const base = 3 + Math.floor(G.runTimer/600); // 隨時間增加批次量
  const count = mod.countMult ? Math.floor(base * mod.countMult) : base;
  for(let i=0;i<Math.min(count,12);i++){
    let type='normal';
    const r=Math.random();
    const eliteRate = (mod.eliteRate||1) * 0.12;
    const bossWave = mod.bossWave && G.wave%1===0 && G.wave===1;
    if(bossWave && i===0){
      type='boss';
    } else if(r<eliteRate){
      type='elite';
    } else if(r<0.55){
      type='normal';
    } else if(r<0.75){
      type='fast';
    } else {
      type='heavy';
    }
    const e = createEnemy(type, Math.max(1, Math.floor(G.runTimer/600)));
    if(mod.enemyHp) e.hp = Math.max(1, Math.floor(e.hp * mod.enemyHp));
    if(mod.enemyDmg) e.dmg = Math.max(0.5, e.dmg * mod.enemyDmg);
    G.enemies.push(e);
  }
}

function checkRunEnd(){
  // 守護劍 HP=0 → 遊戲結束
  if(G.guardian.hp<=0){
    G.guardian.hp=0;
    endRun('death');
    return;
  }
  // 時間到 (90秒 = 5400 frames) → 強制結束
  if(G.runTimer >= 5400){
    endRun('timeout');
    return;
  }
  // 中局選擇：45秒時出現一次分歧
  if(G.runTimer >= 2700 && !G.midChoiceMade && !G.showOverlay){
    G.midChoiceMade=true;
    showMidRunChoice();
  }
}

function endRun(reason){
  G.runActive=false;
  G.runPhase='result';
  G.totalRuns++;
  // 結算：這局獲得的靈魂和累積金幣
  const soulBonus = Math.floor(G.runTimer/300) + Math.floor(G.kills/20);
  const soulMult = (G.pathMods.soulMult||1);
  G.souls += Math.floor(soulBonus * soulMult);
  G.roundSouls = Math.floor(soulBonus * soulMult);
  G.roundGold = G.roundGold;
  showOverlay('runresult');
}

function showMidRunChoice(){
  const choices = shuffle([...RUN_PATHS]).slice(0,2);
  // 確保跟當前路線不同
  while(choices[0] && choices[0].id === (G.pathMods._id||'')){
    choices[0]=RUN_PATHS[Math.floor(Math.random()*RUN_PATHS.length)];
  }
  G.pathChoices = choices;
  showOverlay('midchoice');
}

// ─── ATTACK SYSTEM ──────────────────────────────────────────────────────────

function playerSwing(){
  const p=G.player;
  if(p.isSwinging||!G.canSwing) return;
  p.isSwinging=true;
  p.swingTimer=Math.max(12,Math.floor(30*p.atkSpd));
  p.swingProg=0;
  p.swingAngle=0;

  const wep=WEAPONS[p.weaponIdx];
  let baseAtk=p.atk+wep.atk;
  let rangeVal=(p.range+wep.range)*(p.artifacts.includes('cleave')?1.5:1);
  if(G.berserkActive) baseAtk=Math.floor(baseAtk*1.5);
  const swingArc=Math.PI*0.8;
  const dir=p.facing;

  let hitCount=0;
  for(let i=G.enemies.length-1;i>=0;i--){
    const e=G.enemies[i];
    if(e.dead||dist(p,e)>rangeVal) continue;
    const angle=Math.atan2(e.y-p.y,e.x-p.x);
    let diff=angle-(dir>0?0:Math.PI);
    if(diff>Math.PI) diff-=Math.PI*2;
    if(diff<-Math.PI) diff+=Math.PI*2;
    if(Math.abs(diff)>swingArc/2) continue;

    let dmg=Math.max(1,Math.floor(baseAtk-e.dmg*0.2));
    e.hp-=dmg;
    e.hitTimer=10;
    hitCount++;
    // 傷害數字
    G.dmgNumbers.push({x:e.x+rand(-8,8),y:e.y-rand(5,15),txt:dmg,life:25,color:'#ffcc44'});

    if(p.artifacts.includes('clone')){
      const bonus=G.berserkActive?1.5:1;
      e.hp-=Math.floor(baseAtk*0.5*bonus);
    }
    if(p.artifacts.includes('fire_orb')){e.burnTimer=60;e.burnDmg=Math.floor(baseAtk*0.15);}
    if(p.artifacts.includes('ice_orb')){e.slowTimer=40;}
    if(p.artifacts.includes('thunder_orb')&&hitCount%3===0){ chainLightning(e,baseAtk); }

    if(e.hp<=0){ enemyKilled(e,baseAtk); }
  }

  if(hitCount>0){
    G.shakeMag=Math.min(G.shakeMag+3,10);
    if(p.artifacts.includes('vampire')){
      let heal=Math.floor(baseAtk*0.1)*hitCount;
      G.guardian.hp=Math.min(G.guardian.maxHp,G.guardian.hp+heal);
      if(heal>0) addParticle(G.guardian.x,G.guardian.y-20,0,-1,20,'#66ff88',5,'#66ff88');
    }
  }
  G.shakeMag*=0.8;
  G.canSwing=false;
  G.swingCooldownTimer=Math.max(5,Math.floor(15*p.atkSpd));
}

function enemyKilled(e,baseAtk){
  const p=G.player;
  addSparks(e.x,e.y,10,'#ffcc44',3);
  addParticle(e.x,e.y,0,0,15,'#ffffff',5,'#ffffff');
  e.dead=true;

  p.killStreak++;
  if(p.artifacts.includes('berserk')&&p.killStreak>=10){
    G.berserkActive=true;
    G.berserkTimer=300;
    p.killStreak=0;
    addEffect(p.x,p.y,40,'#ff2244',15);
  }

  const goldMult=p.artifacts.includes('greed')?1.5:1;
  G.gold+=Math.floor(e.gold*goldMult);
  G.score+=e.value;

  if(Math.random()<e.soulChance){ G.souls++; addParticle(e.x,e.y,0,-2,25,'#cc66ff',6,'#cc66ff'); saveGame(); }

  if(p.artifacts.includes('explode')){
    addExplosion(e.x,e.y,40,'#ff8844');
    for(let j=G.enemies.length-1;j>=0;j--){
      if(j===G.enemies.indexOf(e)||G.enemies[j].dead) continue;
      if(dist(G.enemies[j],e)<50){
        G.enemies[j].hp-=Math.floor(baseAtk*0.6);
        if(G.enemies[j].hp<=0) G.enemies[j].dead=true;
      }
    }
    if(p.artifacts.includes('fire_orb')){
      G.effects.push({x:e.x,y:e.y,radius:60,maxRadius:60,life:40,maxLife:40,color:'#ff4400',fireGround:true});
    }
  }

  G.combo++;
  if(G.combo>G.maxCombo) G.maxCombo=G.combo;
  // 普通掉落（降低機率）
  if(Math.random()<0.2) spawnDrops(e.x,e.y,1);
  // 菁英必定掉落
  if(e.isElite){
    if(Math.random()<0.4) spawnDrops(e.x,e.y,1);
    if(Math.random()<0.25) forceDrop(e.x,e.y,'artifact');
    forceDrop(e.x,e.y,'soul');
  }
  // BOSS 必定大量掉落
  if(e.isBoss){
    spawnDrops(e.x,e.y,3);
    forceDrop(e.x,e.y,'artifact');
    forceDrop(e.x,e.y,'soul');
    if(Math.random()<0.4) forceDrop(e.x,e.y,'weapon');
  }
}

function chainLightning(source,dmg){
  let targets=G.enemies.filter(e=>!e.dead&&dist(e,source)<150);
  targets.sort((a,b)=>dist(a,source)-dist(b,source));
  for(let i=0;i<Math.min(3,targets.length);i++){
    const t=targets[i];
    t.hp-=Math.floor(dmg*0.5);
    t.hitTimer=10;t.shockTimer=20;
    G.dmgNumbers.push({x:t.x+rand(-5,5),y:t.y-rand(5,10),txt:Math.floor(dmg*0.5),life:20,color:'#44ddff'});
    if(G.player.artifacts.includes('ice_orb')) t.slowTimer=30;
    drawLine(source.x,source.y,t.x,t.y,'#44ddff',3);
    addSparks(t.x,t.y,6,'#44ddff',2);
    if(t.hp<=0){t.dead=true; enemyKilled(t,Math.floor(dmg*0.5));}
  }
}

// ─── SKILL SYSTEM ───────────────────────────────────────────────────────────

function castSkill(skillId){
  const p=G.player;
  if(p.skillTimers[skillId]>0) return;
  const sk=SKILLS.find(s=>s.id===skillId);
  if(!sk) return;
  p.skillTimers[skillId]=sk.cd*60;
  const lvl=p.skillLevels[skillId]||1;
  const mult=1+(lvl-1)*0.2;
  const atk=p.atk;

  switch(skillId){
    case 'whirlwind':{
      const d=Math.floor(atk*(sk.dmg||1.5)*mult);
      const r=sk.range||120;
      for(let i=G.enemies.length-1;i>=0;i--){
        const e=G.enemies[i];if(e.dead||dist(p,e)>r)continue;
        e.hp-=d;e.hitTimer=10;G.dmgNumbers.push({x:e.x+rand(-5,5),y:e.y-rand(5,10),txt:d,life:20,color:'#88ccff'});
        if(e.hp<=0){e.dead=true;enemyKilled(e,d);}
      }
      addEffect(p.x,p.y,r,'#88ccff',15);addSparks(p.x,p.y,25,'#88ccff',5);
      break;
    }
    case 'shockwave':{
      const d=Math.floor(atk*(sk.dmg||1.2)*mult);
      G.projectiles.push({x:p.x,y:p.y,dir:p.facing,speed:6,range:sk.range||250,radius:15,dmg:d,hit:new Set(),life:60,color:'#4488ff'});
      break;
    }
    case 'blade_rain':{
      const d=Math.floor(atk*(sk.dmg||2.0)*mult);
      const r=sk.range||200;
      for(let i=0;i<12;i++) addParticle(rand(p.x-80,p.x+80),rand(p.y-r/2,p.y-20),rand(-0.5,0.5),rand(2,5),30,'#aaccff',4,'#aaccff');
      for(let i=G.enemies.length-1;i>=0;i--){
        const e=G.enemies[i];if(e.dead||Math.abs(e.x-p.x)>r||e.y>p.y||e.y<p.y-r)continue;
        e.hp-=d;e.hitTimer=10;if(e.hp<=0){e.dead=true;enemyKilled(e,d);}
      }
      break;
    }
    case 'barrier':
      G.guardian.shieldBlock=999;
      setTimeout(()=>{G.guardian.shieldBlock=G.player.artifacts.includes('shield')?1:0;},(sk.dur||3)*1000);
      addEffect(G.guardian.x,G.guardian.y,60,'#66ddff',30);
      break;
    case 'heal_skill':{
      const h=Math.floor((sk.heal||20)*mult);
      G.guardian.hp=Math.min(G.guardian.maxHp,G.guardian.hp+h);
      addEffect(G.guardian.x,G.guardian.y,40,'#66ff88',20);
      break;
    }
    case 'fury':
      G.berserkActive=true;G.berserkTimer=(sk.dur||5)*60;
      addEffect(p.x,p.y,50,'#ff4444',15);
      break;
    case 'slow_time':
      for(const e of G.enemies){e.slowTimer=(sk.dur||4)*60;}
      addEffect(p.x,p.y,200,'#88ddff',25);
      break;
    case 'thunder':{
      const d=Math.floor(atk*(sk.dmg||3.0)*mult);
      let target=null,td=Infinity;
      for(const e of G.enemies){if(!e.dead&&dist(p,e)<td){target=e;td=dist(p,e);}}
      if(target){
        target.hp-=d;target.hitTimer=15;
        G.dmgNumbers.push({x:target.x+rand(-5,5),y:target.y-rand(5,10),txt:d,life:20,color:'#ffdd44'});
        addEffect(target.x,target.y,30,'#ffdd44',10);addSparks(target.x,target.y,20,'#ffdd44',4);
        if(target.hp<=0){target.dead=true;enemyKilled(target,d);}
      }
      break;
    }
    case 'shadow_strike':{
      const d=Math.floor(atk*(sk.dmg||2.5)*mult);
      const r=sk.range||140;
      let target=null,td=Infinity;
      for(const e of G.enemies){if(!e.dead&&dist(p,e)<td){target=e;td=dist(p,e);}}
      if(target){
        addEffect(p.x,p.y,40,'#6644cc',10);
        p.x=clamp(target.x+rand(-30,30),40,GW-40);
        p.y=clamp(target.y+rand(-30,30),40,GH-40);
        addEffect(p.x,p.y,50,'#8866ff',15);
        for(let i=G.enemies.length-1;i>=0;i--){
          const e=G.enemies[i];if(e.dead||dist(p,e)>r)continue;
        e.hp-=d;e.hitTimer=10;G.dmgNumbers.push({x:e.x+rand(-5,5),y:e.y-rand(5,10),txt:d,life:20,color:'#aaccff'});
        if(e.hp<=0){e.dead=true;enemyKilled(e,d);}
        }
      }
      break;
    }
  }
}

// ─── SYNERGY ────────────────────────────────────────────────────────────────

function checkSynergies(){
  G.player.activeSynergies=[];
  const a=G.player.artifacts;
  for(const syn of SYNERGIES){
    if(a.includes(syn.pair[0])&&a.includes(syn.pair[1])){
      G.player.activeSynergies.push(syn);
    }
  }
}

function checkSynergyForArt(id){
  const a=G.player.artifacts;
  for(const syn of SYNERGIES){
    if((syn.pair[0]===id&&a.includes(syn.pair[1]))||(syn.pair[1]===id&&a.includes(syn.pair[0]))) return '✨ '+syn.name;
  }
  return '';
}

// ─── STAT CALC ──────────────────────────────────────────────────────────────

function recalcStats(){
  const p=G.player, wep=WEAPONS[p.weaponIdx]||WEAPONS[0];
  let atk=wep.atk, range=wep.range, spd=wep.spd, hp=100, def=0;
  const pu=G.permUpgrades;
  atk+=(pu.perm_atk||0)*2;
  hp+=(pu.perm_hp||0)*5;
  def+=(pu.perm_armor||0);
  for(const eq of Object.values(p.equips)){if(eq){hp+=eq.hp||0;def+=eq.def||0;}}
  const ru=G.runUpgrades;
  atk+=(ru.atk||0)*2;
  range+=(ru.range||0)*3;
  spd=Math.max(0.3,spd-(ru.atkspd||0)*0.03);
  hp+=(ru.hp||0)*5;
  p.maxHp=Math.max(20,hp);
  p.atk=Math.max(1,atk);
  p.range=Math.max(30,range);
  p.atkSpd=Math.max(0.15,spd);
  p.def=Math.max(0,def);
  p.slotCount=4+(pu.perm_slots||0)+(ru.slots||0);
  if(p.hp>p.maxHp)p.hp=p.maxHp;
}

// ─── GAME OVER ──────────────────────────────────────────────────────────────

function gameOver(){
  G.screen='gameover';
  G.runActive=false;
  document.getElementById('pauseBtn').style.display='none';
  // 追蹤總遊玩次數與最佳波次
  if(G.wave>(G.permUpgrades.bestWave||0)){
    G.permUpgrades.bestWave=G.wave;
  }
  G.permUpgrades.totalRuns=(G.permUpgrades.totalRuns||0)+1;
  // 靈魂碎片獎勵（全 session 結算）
  const soulReward=Math.floor(G.totalRuns*2)+Math.floor(G.kills/30);
  G.souls+=soulReward;
  saveGame();
  showOverlay('gameover');
}

// ─── INIT ───────────────────────────────────────────────────────────────────

function initGame(){
  G.score=0;G.gold=100;G.kills=0;G.wave=0;
  G.enemies=[];G.drops=[];G.particles=[];G.effects=[];G.projectiles=[];G.dmgNumbers=[];
  G.shakeMag=0;G.combo=0;G.maxCombo=0;
  G.berserkActive=false;G.berserkTimer=0;G.totalTime=0;
  G.runUpgrades={};G.waveState='idle';
  G.totalRuns=0;G.roundSouls=0;G.roundGold=0;
  const p=G.player;
  p.x=200;p.y=GH/2;p.hp=100;p.maxHp=100;p.speed=3.0;
  p.atk=10;p.range=60;p.atkSpd=0.6;p.def=0;p.slotCount=4;
  p.swingTimer=0;p.swingAngle=0;p.isSwinging=false;p.facing=1;
  p.weaponIdx=0;p.equips={};p.skills=[];p.artifacts=[];p.activeSynergies=[];
  p.killStreak=0;p.skillTimers={};p.skillLevels={};
  G.guardian.x=80;G.guardian.y=GH/2;G.guardian.hp=100;G.guardian.maxHp=100;G.guardian.shieldBlock=0;
  loadGame();
  recalcStats();
  G.guardian.hp=G.guardian.maxHp;
  p.hp=p.maxHp;
  G.screen='playing';
  document.getElementById('pauseBtn').style.display='block';
  showPathSelect();
}

// ─── UPDATE ─────────────────────────────────────────────────────────────────

function update(){
  const p=G.player;
  G.shakeX*=0.85;G.shakeY*=0.85;G.shakeMag*=0.9;

  // Move player toward mouse
  if(G.screen==='playing'){
    const dx=G.mouseX-p.x, dy=G.mouseY-p.y;
    const d=Math.hypot(dx,dy);
    if(d>5){
      p.x+=(dx/d)*p.speed;p.y+=(dy/d)*p.speed;
      p.facing=dx>0?1:-1;
    }
    p.x=clamp(p.x,25,GW-25);p.y=clamp(p.y,25,GH-25);
  }

  // Swing animation
  if(p.isSwinging){
    p.swingTimer-=G.dt;
    p.swingProg=1-p.swingTimer/30;
    if(p.swingTimer<=0){p.isSwinging=false;p.swingTimer=0;p.swingProg=1;}
  }

  // Swing cooldown
  if(!G.canSwing){
    G.swingCooldownTimer-=G.dt;
    if(G.swingCooldownTimer<=0){G.canSwing=true;G.swingCooldownTimer=0;}
  }

  // Auto-attack
  if(G.runActive && G.canSwing && !p.isSwinging && G.enemies.some(e=>!e.dead&&dist(p,e)<p.range+60)){
    playerSwing();
  }

  // Berserk timer
  if(G.berserkActive){G.berserkTimer-=G.dt;if(G.berserkTimer<=0){G.berserkActive=false;G.berserkTimer=0;}}

  // Update enemies
  for(let i=G.enemies.length-1;i>=0;i--){
    const e=G.enemies[i];
    if(e.dead){G.enemies.splice(i,1);continue;}
    e.anim+=0.03;
    if(e.hitTimer>0) e.hitTimer--;
    if(e.slowTimer>0) e.slowTimer--;
    if(e.burnTimer>0){e.burnTimer--;if(e.burnTimer%10===0){e.hp-=e.burnDmg;addParticle(e.x+rand(-5,5),e.y+rand(-5,5),rand(-1,1),rand(-1,1),15,'#ff6600',3,'#ff6600');}}
    if(e.shockTimer>0) e.shockTimer--;

    let spd=e.speed*(e.slowTimer>0?0.3:1);
    e.x-=spd;
    e.y+=Math.sin(e.anim)*0.2;

    // Reached guardian
    if(e.x<=G.guardian.x+25){
      if(G.guardian.shieldBlock>0){
        G.guardian.shieldBlock--;
        addEffect(G.guardian.x,G.guardian.y,50,'#66ddff',15);
        if(G.player.artifacts.includes('thorns')){
          const m=G.player.artifacts.includes('shield')?2:1;
          e.hp-=Math.floor(e.dmg*0.25*m);
          addSparks(e.x,e.y,8,'#88ff44',3);
        }
        e.dead=true;continue;
      }
      G.guardian.hp-=e.dmg;
      addEffect(G.guardian.x-10,G.guardian.y,25,'#ff4444',10);
      G.shakeMag=Math.min(G.shakeMag+5,15);
      if(G.player.artifacts.includes('thorns')){
        const m=G.player.artifacts.includes('shield')?2:1;
        e.hp-=Math.floor(e.dmg*0.25*m);
        addSparks(e.x,e.y,6,'#88ff44',2);
      }
      e.dead=true;
      if(G.guardian.hp<=0){G.guardian.hp=0;if(G.runActive)endRun('death');else gameOver();return;}
    }

    // Poison aura
    if(G.player.artifacts.includes('poison')&&dist(e,G.guardian)<100){
      e.hp-=0.5;
      if(Math.random()<0.05) addParticle(e.x+rand(-8,8),e.y+rand(-8,8),0,0,20,'#66ff44',3,'#66ff44');
      if(e.hp<=0){e.dead=true;addSparks(e.x,e.y,8,'#44ff66',2);}
    }
  }

  // Regen
  if(G.player.artifacts.includes('heal_stone')&&G.totalTime%480===0){
    G.guardian.hp=Math.min(G.guardian.maxHp,G.guardian.hp+10);
    addParticle(G.guardian.x,G.guardian.y-20,0,-1,20,'#66ff88',4,'#66ff88');
  }

  // Auto-cast skills
  for(const sk of SKILLS){
    if(!G.player.skills.includes(sk.id)) continue;
    if(!G.player.skillTimers[sk.id]) G.player.skillTimers[sk.id]=0;
    G.player.skillTimers[sk.id]-=G.dt;
    if(G.player.skillTimers[sk.id]<=0) castSkill(sk.id);
  }

  // Drops（預設自動吸引）
  for(let i=G.drops.length-1;i>=0;i--){
    const d=G.drops[i];d.life--;d.bob+=0.03;
    d.x+=d.vx*0.5;d.y+=d.vy*0.5+Math.sin(d.bob)*0.1;
    d.vx*=0.95;d.vy*=0.95;
    if(d.life<=0){G.drops.splice(i,1);continue;}
    // 自動吸引（所有掉落物自動飛向玩家）
    const attraction = G.player.artifacts.includes('magnet') ? 250 : 120;
    if(dist(d,G.player)<attraction){
      const dd=dist(d,G.player);
      if(dd>15){
        const pullSpeed = G.player.artifacts.includes('magnet') ? 6 : 3;
        d.x+=(G.player.x-d.x)/dd*pullSpeed;
        d.y+=(G.player.y-d.y)/dd*pullSpeed;
      }
      if(dist(d,G.player)<25){collectDrop(d);G.drops.splice(i,1);}
    }
  }

  // Damage numbers
  for(let i=G.dmgNumbers.length-1;i>=0;i--){
    const dn=G.dmgNumbers[i];
    dn.y-=1.5;
    dn.life--;
    if(dn.life<=0) G.dmgNumbers.splice(i,1);
  }

  // Projectiles
  for(let i=G.projectiles.length-1;i>=0;i--){
    const pr=G.projectiles[i];pr.x+=pr.dir*pr.speed;pr.life--;
    if(pr.life<=0||pr.range<=0){G.projectiles.splice(i,1);continue;}
    pr.range-=pr.speed;
    for(const e of G.enemies){
      if(e.dead||pr.hit.has(e)) continue;
      if(dist(pr,e)<pr.radius+8){
        e.hp-=pr.dmg;e.hitTimer=10;pr.hit.add(e);
        addSparks(e.x,e.y,6,'#4488ff',2);
        if(e.hp<=0){e.dead=true;enemyKilled(e,pr.dmg);}
      }
    }
  }

  // Particles
  for(let i=G.particles.length-1;i>=0;i--){
    const pt=G.particles[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.life--;
    pt.vx*=0.97;pt.vy*=0.97;
    if(pt.life<=0) G.particles.splice(i,1);
  }

  // Effects
  for(let i=G.effects.length-1;i>=0;i--){
    G.effects[i].life--;
    if(G.effects[i].life<=0) G.effects.splice(i,1);
  }

  // Run timer + 密集出生
  if(G.runActive && G.runPhase==='playing'){
    G.runTimer += G.dt;
    updateSpawning();
    checkRunEnd();
  }

  // 中局選擇計時（若已觸發但 overlay 未關，等使用者選完）
  if(G.runPhase==='midchoice' && !G.showOverlay){
    G.runPhase='playing';
    G.showOverlay=false;
  }

  // Background mist
  if(Math.random()<0.15 && G.terrain?.id!=='lava') addParticle(rand(0,GW),GH+5,rand(-0.2,0.2),rand(-0.8,-0.3),rand(60,180),'rgba(100,120,180,0.2)',rand(1,3));
  if(G.terrain?.id==='lava' && Math.random()<0.2) addParticle(rand(0,GW),GH-rand(0,40),rand(-0.5,0.5),rand(-1.5,-0.5),rand(30,60),'rgba(255,150,50,0.3)',rand(1,3));

  G.totalTime++;
}

// ─── COLLECT DROP ────────────────────────────────────────────────────────────

function collectDrop(d){
  const item=d.item;
  switch(item.type){
    case 'gold':{const v=item.val||1;G.gold+=v;G.roundGold+=v;addParticle(d.x,d.y,0,-2,10,'#ffcc44',4,'#ffcc44');}break;
    case 'soul':{const v=item.val||1;G.souls+=v;G.roundSouls+=v;addParticle(d.x,d.y,0,-2,15,'#cc66ff',5,'#cc66ff');saveGame();}break;
    case 'weapon':{
      const idx=WEAPONS.findIndex(w=>w.id===item.id);
      if(idx>G.player.weaponIdx){G.player.weaponIdx=idx;addEffect(d.x,d.y,30,'#4488ff',15);recalcStats();}
      break;
    }
    case 'equip':{
      const eq=item.data;if(!eq)break;
      const old=G.player.equips[eq.type];
      if(!old||eq.rarity>old.rarity){G.player.equips[eq.type]=eq;addEffect(d.x,d.y,30,'#44dd88',15);recalcStats();}
      break;
    }
    case 'skill':{
      const sid=item.id;
      if(!G.player.skills.includes(sid)){G.player.skills.push(sid);G.player.skillLevels[sid]=1;}
      else G.player.skillLevels[sid]=(G.player.skillLevels[sid]||1)+1;
      addEffect(d.x,d.y,30,'#ff66aa',15);break;
    }
    case 'artifact':{
      const aid=item.id;
      if(!G.player.artifacts.includes(aid)){G.player.artifacts.push(aid);checkSynergies();}
      addEffect(d.x,d.y,35,'#ffaa44',20);break;
    }
  }
  addParticle(d.x,d.y,0,0,8,'#ffffff',4);
}

// ─── DRAWING ────────────────────────────────────────────────────────────────

function drawBackground(){
  const t = G.terrain || TERRAINS[0];
  const grad=ctx.createLinearGradient(0,0,0,GH);
  grad.addColorStop(0,t.bg);grad.addColorStop(0.5,t.bg);grad.addColorStop(1,t.bg);
  ctx.fillStyle=grad;ctx.fillRect(0,0,GW,GH);

  // Floor
  fillRect(0,GH-40,GW,40,t.floor);
  fillRect(0,GH-40,GW,2,t.line);

  // Pillars left
  for(let i=0;i<2;i++){
    const px=10+i*50;
    fillRect(px,30,30,GH-70,t.accent);
    fillRect(px-2,30,34,4,'rgba(60,65,90,0.2)');
    fillRect(px-2,GH-74,34,4,'rgba(60,65,90,0.2)');
  }

  // Gate pillars right
  for(let i=0;i<2;i++){
    const px=GW-100+i*60;
    fillRect(px,20,35,GH-60,t.accent);
    fillRect(px-2,20,39,4,'rgba(60,65,90,0.2)');
    fillRect(px-2,GH-64,39,4,'rgba(60,65,90,0.2)');
  }

  // Dark arch
  ctx.strokeStyle='rgba(60,50,80,0.5)';ctx.lineWidth=6;
  ctx.beginPath();ctx.arc(GW-25,GH/2,100,-Math.PI/2-0.5,Math.PI/2+0.5);ctx.stroke();
  fillRect(GW-30,GH/2-110,20,220,'rgba(20,15,30,0.3)');

  // 熔岩地形額外效果
  if(t.id==='lava'){
    for(let i=0;i<3;i++){
      const lx = 100 + i*280 + Math.sin(G.totalTime*0.02+i)*20;
      fillRect(lx,GH-38,60,36,'rgba(255,100,20,0.08)');
    }
  }
  // 冰封地形額外效果
  if(t.id==='frost'){
    for(let i=0;i<5;i++){
      const fx = 50 + i*180;
      fillRect(fx,GH-42,4,40,'rgba(100,180,255,0.06)');
    }
  }
}

function drawGuardianSword(){
  const g=G.guardian,x=g.x,y=g.y;
  const hpR=g.hp/g.maxHp;
  const glowC=hpR>0.5?`rgba(100,200,255,${0.3+hpR*0.3})`:`rgba(255,80,80,${0.3+(1-hpR)*0.4})`;

  // Pedestal
  fillRect(x-22,y-35,44,70,'rgba(40,35,60,0.7)');
  fillRect(x-28,y+25,56,15,'rgba(60,50,90,0.5)');
  fillRect(x-15,y-48,30,15,'rgba(60,50,90,0.5)');

  // Pedestal glow
  setGlow('rgba(120,80,255,0.3)',30);
  fillRect(x-28,y-50,56,100,'rgba(120,80,255,0.08)');
  noGlow();

  // Blade
  setGlow(glowC,25);
  ctx.fillStyle='#8899cc';
  ctx.beginPath();
  ctx.moveTo(x-4,y-45);ctx.lineTo(x+4,y-45);
  ctx.lineTo(x+6,y-8);ctx.lineTo(x+4,y+10);
  ctx.lineTo(x-4,y+10);ctx.lineTo(x-6,y-8);
  ctx.closePath();ctx.fill();

  // Glowing core
  const coreC=hpR>0.5?'#66ddff':'#ff6666';
  fillRect(x-1,y-38,2,38,coreC);
  setGlow(coreC,12);
  fillCircle(x,y-42,4,coreC);
  fillCircle(x,y+8,3,coreC);
  noGlow();

  // HP bar
  const bw=50;
  fillRect(x-bw/2,y-60,bw,6,'rgba(0,0,0,0.6)');
  ctx.fillStyle=hpR>0.5?'#66ff88':hpR>0.25?'#ffcc44':'#ff4444';
  ctx.fillRect(x-bw/2+1,y-59,(bw-2)*Math.max(0,hpR),4);
  ctx.fillStyle='#ccddff';ctx.font='9px sans-serif';ctx.textAlign='center';
  ctx.fillText(Math.ceil(g.hp)+'/'+g.maxHp,x,y-65);
}

function drawPlayer(){
  const p=G.player,px=p.x,py=p.y,facing=p.facing;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(px,py+22,18,5,0,0,Math.PI*2);ctx.fill();

  // Cape
  ctx.fillStyle='#1a1a3a';
  ctx.beginPath();ctx.moveTo(px-10*facing,py-8);
  ctx.quadraticCurveTo(px-18*facing,py+15,px-8*facing,py+25);
  ctx.quadraticCurveTo(px-3*facing,py+20,px-5*facing,py+8);ctx.fill();

  // Legs
  fillRect(px-7,py+8,6,14,'#2a2a4a');fillRect(px+1,py+8,6,14,'#2a2a4a');
  fillRect(px-8,py+20,8,4,'#3a3a5a');fillRect(px,py+20,8,4,'#3a3a5a');

  // Body armor
  ctx.fillStyle='#2a3a6a';
  ctx.beginPath();ctx.ellipse(px,py+5,13,11,0,0,Math.PI*2);ctx.fill();

  // Armor highlight
  ctx.fillStyle='rgba(100,150,255,0.15)';
  ctx.beginPath();ctx.ellipse(px,py+5,10,8,0,0,Math.PI*2);ctx.fill();

  // Belt
  fillRect(px-12,py+10,24,3,'#4a3a2a');
  fillRect(px-2,py+9,4,5,'#ddaa44');

  // Shoulder plates
  fillCircle(px-14*facing,py-2,6,'#3a4a7a');
  fillCircle(px+14*facing,py-2,6,'#3a4a7a');

  // Arms
  ctx.save();ctx.translate(px-11,py+2);ctx.rotate(facing>0?-0.3:0.3);
  fillRect(-3,0,5,14,'#2a3a6a');ctx.restore();
  ctx.save();ctx.translate(px+9,py+2);ctx.rotate(facing>0?0.3:-0.3);
  fillRect(-3,0,5,14,'#2a3a6a');ctx.restore();

  // Head
  fillCircle(px,py-12,10,'#3a3a5a');

  // 攻擊範圍指示（微弱圈圈，待命時可見）
  if(!p.isSwinging){
    const rangeR = (p.range+WEAPONS[p.weaponIdx].range)*(p.artifacts.includes('cleave')?1.5:1);
    ctx.strokeStyle='rgba(136,221,255,0.08)';
    ctx.lineWidth=1;
    ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.arc(px,py,rangeR*0.8,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Helmet
  ctx.fillStyle='#4a5a8a';
  ctx.beginPath();ctx.arc(px,py-14,11,Math.PI,0);ctx.fill();

  // Visor glow
  setGlow('#66ddff',8);
  fillRect(px-6,py-15,12,2,'#66ddff');
  noGlow();
  fillRect(px-7,py-16,14,4,'rgba(100,220,255,0.15)');

  // Sword
  drawSword(px,py,facing);

  // Berserk aura
  if(G.berserkActive){
    setGlow('#ff4444',15);
    ctx.strokeStyle='rgba(255,50,50,0.3)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px,py,30+p.swingProg*5,0,Math.PI*2);ctx.stroke();
    noGlow();
  }

  // HP bar
  const hpR=p.hp/p.maxHp;
  fillRect(px-15,py-28,30,4,'rgba(0,0,0,0.5)');
  ctx.fillStyle=hpR>0.5?'#66ff88':hpR>0.25?'#ffcc44':'#ff4444';
  ctx.fillRect(px-14,py-27,28*hpR,2);
}

function drawSword(px,py,facing){
  const p=G.player,wep=WEAPONS[p.weaponIdx];
  const swordLen=40+(wep.range-55)*0.3;

  if(p.isSwinging&&p.swingProg>0){
    const arcAngle=Math.PI*0.8;
    const startA=(-arcAngle/2)*facing+(facing>0?0:Math.PI);
    const endA=(arcAngle/2)*facing+(facing>0?0:Math.PI);
    const curA=startA+(endA-startA)*Math.min(1,p.swingProg*1.5);

    // === 明顯的揮斬弧光 ===
    // 外層大範圍光弧（顯示攻擊範圍）
    setGlow('#88ddff',35);
    ctx.strokeStyle='rgba(136,221,255,0.5)';
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.arc(px,py,swordLen*0.8,startA,curA);
    ctx.stroke();
    noGlow();

    // 內層白色核心弧
    setGlow('#aaddff',20);
    ctx.strokeStyle='rgba(200,230,255,0.7)';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(px,py,swordLen*0.8,startA,curA);
    ctx.stroke();
    noGlow();

    // Blade
    const bx=px+Math.cos(curA)*swordLen*0.3;
    const by=py+Math.sin(curA)*swordLen*0.3;
    const tx=px+Math.cos(curA)*swordLen;
    const ty=py+Math.sin(curA)*swordLen;

    setGlow('#aaddff',12);
    ctx.fillStyle='#8899cc';
    ctx.beginPath();
    ctx.moveTo(bx,by);ctx.lineTo(tx+6,ty);ctx.lineTo(tx-6,ty);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(136,221,255,0.3)';
    ctx.beginPath();
    ctx.moveTo(bx,by);ctx.lineTo(tx+3,ty);ctx.lineTo(tx-3,ty);
    ctx.closePath();ctx.fill();
    noGlow();

    // 斬擊方向粒子
    for(let i=0;i<4;i++){
      const a=curA+rand(-0.3,0.3);
      const dist2=swordLen*(0.4+rand(0,0.5));
      addParticle(px+Math.cos(a)*dist2,py+Math.sin(a)*dist2,
        rand(-1,1)*0.5,rand(-1,1)*0.5,rand(8,15),
        `rgba(136,221,255,${rand(0.3,0.6)})`,rand(2,5));
    }
  } else {
    // Idle on back
    ctx.save();ctx.translate(px-12*facing,py-5);
    ctx.rotate(facing>0?-0.8:0.8);
    fillRect(-2,-swordLen,4,swordLen,'#7788aa');
    fillRect(-6,-5,12,4,'#5566aa');
    ctx.fillStyle='#8899cc';
    ctx.beginPath();ctx.moveTo(-2,-swordLen);
    ctx.lineTo(4,-swordLen+8);ctx.lineTo(-4,-swordLen+8);
    ctx.closePath();ctx.fill();
    ctx.restore();
  }
}

function drawEnemy(e){
  const x=e.x,y=e.y,s=e.size;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(x,y+s*0.8,s*0.7,s*0.2,0,0,Math.PI*2);ctx.fill();

  // Body glow
  if(e.isBoss) setGlow(e.color,25);
  else if(e.isElite) setGlow(e.color,12);

  // Body shape
  ctx.fillStyle=e.color;
  ctx.beginPath();
  if(e.isBoss){
    ctx.arc(x,y,s,0,Math.PI*2);
    ctx.arc(x-10,y+5,s*0.5,0,Math.PI*2);
    ctx.arc(x+10,y+5,s*0.5,0,Math.PI*2);
  } else if(e.isElite){
    ctx.arc(x,y,s,0,Math.PI*2);
  } else {
    ctx.ellipse(x,y,s,s*0.8,0,0,Math.PI*2);
  }
  ctx.fill();
  noGlow();

  // Crown/Star
  if(e.isBoss){
    setGlow('#ffcc44',10);
    ctx.fillStyle='#ffcc44';
    ctx.beginPath();
    ctx.moveTo(x-14,y-s-2);ctx.lineTo(x-10,y-s-12);
    ctx.lineTo(x-5,y-s-4);ctx.lineTo(x,y-s-14);
    ctx.lineTo(x+5,y-s-4);ctx.lineTo(x+10,y-s-12);
    ctx.lineTo(x+14,y-s-2);ctx.closePath();ctx.fill();
    fillCircle(x-9,y-s-9,2,'#ff4466');
    fillCircle(x,y-s-11,2,'#44ff88');
    fillCircle(x+9,y-s-9,2,'#ff4466');
    noGlow();
  } else if(e.isElite){
    setGlow('#ffcc44',6);
    ctx.fillStyle='#ffcc44';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('★',x,y-s-4);
    noGlow();
  }

  // Eyes
  const eo=s*0.35;
  fillCircle(x-eo,y-3,s*0.18,'#ffffff');
  fillCircle(x+eo,y-3,s*0.18,'#ffffff');
  fillCircle(x-eo-2,y-2,s*0.07,'#111122');
  fillCircle(x+eo-2,y-2,s*0.07,'#111122');

  // Hit flash
  if(e.hitTimer>0){
    ctx.fillStyle=`rgba(255,255,255,${e.hitTimer/15})`;
    ctx.beginPath();ctx.arc(x,y,s*0.4,0,Math.PI*2);ctx.fill();
  }

  // Slow indicator
  if(e.slowTimer>0){
    ctx.strokeStyle=`rgba(100,200,255,${Math.min(1,e.slowTimer/80)})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(x,y,s+4,0,Math.PI*2);ctx.stroke();
  }

  // Burn spark
  if(e.burnTimer>0&&Math.random()<0.3) addParticle(x+rand(-5,5),y-4,rand(-0.3,0.3),rand(-0.5,0),8,'#ff6600',2);

  // HP bar (when damaged)
  if(e.hp<e.maxHp){
    const bw2=s*1.8,hpR2=e.hp/e.maxHp;
    fillRect(x-bw2/2,y-s-8,bw2,3,'rgba(0,0,0,0.5)');
    ctx.fillStyle=hpR2>0.5?'#66ff88':hpR2>0.25?'#ffcc44':'#ff4444';
    ctx.fillRect(x-bw2/2+1,y-s-7,(bw2-2)*Math.max(0,hpR2),1);
  }
}

function drawDrops(){
  for(const d of G.drops){
    const bob=Math.sin(d.bob)*3,alpha=d.life<60?d.life/60:1;
    ctx.globalAlpha=alpha;
    if(d.icon!=='•') setGlow(d.color,10);
    ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d.icon,d.x,d.y+bob);
    noGlow();
    ctx.globalAlpha=1;
  }
}

function drawEnemiesList(){
  const sorted=[...G.enemies].filter(e=>!e.dead).sort((a,b)=>a.y-b.y);
  for(const e of sorted) drawEnemy(e);
}

function drawEffectsList(){
  for(const ef of G.effects){
    const pr=1-ef.life/ef.maxLife;
    const r=ef.radius*(0.5+pr*0.5),alpha=1-pr;
    ctx.globalAlpha=alpha;
    setGlow(ef.color,20);
    ctx.strokeStyle=ef.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(ef.x,ef.y,Math.max(0,r),0,Math.PI*2);ctx.stroke();
    if(ef.fireGround){
      ctx.fillStyle=`rgba(255,68,0,${alpha*0.15})`;
      ctx.beginPath();ctx.arc(ef.x,ef.y,Math.max(0,r),0,Math.PI*2);ctx.fill();
    }
    noGlow();ctx.globalAlpha=1;
  }
}

function drawProjectilesList(){
  for(const pr of G.projectiles){
    setGlow('#4488ff',12);
    fillCircle(pr.x,pr.y,pr.radius*0.4,'#4488ff');
    ctx.fillStyle='rgba(68,136,255,0.2)';
    ctx.beginPath();ctx.arc(pr.x,pr.y,pr.radius,0,Math.PI*2);ctx.fill();
    noGlow();
  }
}

function drawDamageNumbers(){
  for(const dn of G.dmgNumbers){
    const alpha=dn.life/25;
    ctx.fillStyle=`rgba(255,204,68,${alpha})`;
    ctx.font='bold 14px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(dn.txt,dn.x,dn.y);
    // 外發光
    setGlow(`rgba(255,204,68,${alpha*0.3})`,8);
    ctx.fillText(dn.txt,dn.x,dn.y);
    noGlow();
  }
}

function drawUI(){
  const p=G.player,wep=WEAPONS[p.weaponIdx];

  // Top bar
  fillRect(0,0,GW,28,'rgba(0,0,0,0.65)');
  ctx.fillStyle='#ccddff';ctx.font='11px sans-serif';ctx.textBaseline='middle';

  ctx.textAlign='left';
  ctx.fillStyle='#88aaff';
  const secs = Math.floor(G.runTimer/60);
  const pm=G.pathMods||{};
  ctx.fillText(`⏱ ${secs}s  |  ${pm._name||'準備中'}`,10,14);
  ctx.fillStyle='#ff8866';
  ctx.fillText(`敵人 ${G.enemies.length}`,280,14);

  ctx.textAlign='center';
  ctx.fillStyle='#ffdd88';
  ctx.fillText(`分數 ${G.score}`,330,14);
  ctx.fillStyle='#ffcc44';
  ctx.fillText(`💰 ${G.gold}`,460,14);
  ctx.fillStyle='#88dd88';
  ctx.fillText(`擊殺 ${G.kills}`,560,14);

  ctx.textAlign='right';
  ctx.fillStyle=rarityColor(wep.r);
  ctx.fillText(`⚔️ ${wep.name}`,GW-10,14);

  // Combo
  if(G.combo>2){
    ctx.fillStyle='#ff8844';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText(`🔥 ${G.combo} 連擊!`,GW/2,50);
  }

  // Berserk
  if(G.berserkActive&&Math.sin(G.totalTime*0.2)>0){
    ctx.fillStyle='#ff4444';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
    ctx.fillText('⚡ 狂暴模式 ⚡',GW/2,38);
  }

  // Skills
  const sy=GH-28;
  for(let i=0;i<SKILLS.length;i++){
    const sk=SKILLS[i],has=G.player.skills.includes(sk.id),cd=G.player.skillTimers[sk.id]||0,ready=has&&cd<=0;
    const bx=18+i*34;
    ctx.fillStyle=has?'rgba(30,40,80,0.7)':'rgba(20,20,30,0.4)';
    fillRect(bx-10,sy-10,20,20,'');
    ctx.fillStyle=ctx.fillStyle;
    ctx.fillRect(bx-10,sy-10,20,20);
    ctx.strokeStyle=ready?'#66aaff':has?'#445577':'#333344';ctx.lineWidth=1;
    ctx.strokeRect(bx-10,sy-10,20,20);
    if(has){
      ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=ready?'#ccddff':'#556688';
      ctx.fillText(sk.icon,bx,sy);
      if(!ready){
        fillRect(bx-10,sy-10,20,20,'rgba(0,0,0,0.5)');
        ctx.fillStyle='#88aadd';ctx.font='9px sans-serif';
        ctx.fillText(Math.ceil(cd/60),bx,sy+1);
      }
    } else {
      ctx.fillStyle='#334455';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('?',bx,sy+1);
    }
  }

  // Artifacts
  for(let i=0;i<Math.min(G.player.artifacts.length,8);i++){
    const art=ARTIFACTS.find(a=>a.id===G.player.artifacts[i]);
    if(art){ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(art.icon,12+i*21,38);}
  }
}

// ─── MAIN RENDER ────────────────────────────────────────────────────────────

function render(){
  if(G.screen==='title'){ drawTitleScreen(); return; }

  ctx.save();
  if(G.shakeMag>0.5){
    G.shakeX=(Math.random()-0.5)*G.shakeMag;
    G.shakeY=(Math.random()-0.5)*G.shakeMag;
    ctx.translate(G.shakeX,G.shakeY);
  }

  drawBackground();
  drawGuardianSword();
  drawDrops();
  drawEnemiesList();
  drawProjectilesList();
  drawPlayer();
  drawEffectsList();
  drawDamageNumbers();

  ctx.restore();
  drawUI();
}

function drawTitleScreen(){
  G.totalTime++;
  fillRect(0,0,GW,GH,'#0a0a1a');
  for(let i=0;i<50;i++){
    const x=(Math.sin(i*137.5+G.totalTime*0.008)*0.5+0.5)*GW;
    const y=(Math.cos(i*97.3+G.totalTime*0.006)*0.5+0.5)*GH;
    ctx.fillStyle=`rgba(100,150,255,${0.08+Math.sin(G.totalTime*0.02+i)*0.04})`;
    ctx.beginPath();ctx.arc(x,y,rand(1,3),0,Math.PI*2);ctx.fill();
  }

  setGlow('#8866ff',40);
  ctx.fillStyle='#c8a0ff';ctx.font='bold 44px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('巨劍守護',GW/2,160);
  noGlow();

  ctx.fillStyle='#8899bb';ctx.font='15px sans-serif';
  ctx.fillText('Guardian Blade v3.0',GW/2,200);

  // Decorative swords
  ctx.strokeStyle='rgba(136,170,255,0.25)';ctx.lineWidth=2;
  for(let i=0;i<2;i++){const sx=i===0?120:GW-120;ctx.beginPath();ctx.moveTo(sx,120);ctx.lineTo(sx,145);ctx.moveTo(sx-10,128);ctx.lineTo(sx+10,128);ctx.moveTo(sx-6,145);ctx.lineTo(sx+6,145);ctx.stroke();}

  ctx.fillStyle='#556688';ctx.font='11px sans-serif';
  ctx.fillText('自動揮劍 · 橫向無雙',GW/2,240);

  ctx.fillText(`靈魂碎片: ${G.souls}  |  累計金幣: ${G.gold}`,GW/2,265);
}

function closeOverlay(){
  G.showOverlay=false;
  OV.innerHTML='';
  if(G.screen==='gameover'||G.screen==='title'){
    if(G.screen==='title') showOverlay('title');

// ─── 分歧路線回調 ──────────────────────────────────────────────────────────────

function pickPath(id){
  const path = RUN_PATHS.find(p=>p.id===id);
  if(!path) return;
  G.pathMods = {...path.mods, _id:path.id, _name:path.name};
  G.showOverlay=false;
  OV.innerHTML='';
  startRun();
}

function midPick(id){
  const path = RUN_PATHS.find(p=>p.id===id);
  if(!path) return;
  // 中局選擇：將 modifier 疊加到當前路線
  const base = G.pathMods || {};
  G.pathMods = {
    goldMult: (base.goldMult||1) * (path.mods.goldMult||1),
    dropMult: (base.dropMult||1) * (path.mods.dropMult||1),
    enemyDmg: (base.enemyDmg||1) * (path.mods.enemyDmg||1),
    spawnRate: (base.spawnRate||1) * (path.mods.spawnRate||1),
    eliteRate: (base.eliteRate||1) + (path.mods.eliteRate||0),
    enemyHp: (base.enemyHp||1) * (path.mods.enemyHp||1),
    countMult: (base.countMult||1) * (path.mods.countMult||1),
    soulMult: (base.soulMult||1) * (path.mods.soulMult||1),
    bossWave: base.bossWave || path.mods.bossWave || false,
    _id: id,
    _name: base._name+' → '+path.name
  };
  G.runPhase='playing';
  closeOverlay();
}

function buyPerm(id){
  const pu=PERM_UPGRADES.find(p=>p.id===id);
  if(!pu) return;
  const cur=G.permUpgrades[id]||0;
  if(cur>=pu.max) return;
  const cost=pu.costs[cur];
  if(G.souls<cost) return;
  G.souls-=cost;
  G.permUpgrades[id]=cur+1;
  saveGame();
  addEffect(GW/2,GH/2,40,'#cc66ff',20);
  showOverlay('perm');
}

// ─── START / TITLE ─────────────────────────────────────────────────────────

function startGame(){
  initGame();
  G.showOverlay=false;
  OV.innerHTML='';
}

function backToTitle(){
  G.screen='title';
  G.showOverlay=false;
  OV.innerHTML='';
  showOverlay('title');
}

// ─── GAME LOOP ──────────────────────────────────────────────────────────────

function gameLoop(timestamp){
  const dt=G.lastTime?Math.min((timestamp-G.lastTime)/16.667,3):1;
  G.lastTime=timestamp;
  G.dt=dt;

  if(G.screen==='title'){render();requestAnimationFrame(gameLoop);return;}
  if(G.screen==='gameover'){render();requestAnimationFrame(gameLoop);return;}

  if(G.screen==='playing'&&!G.showOverlay) update();

  render();
  requestAnimationFrame(gameLoop);
}

// ─── EVENTS ─────────────────────────────────────────────────────────────────

CANVAS.addEventListener('mousemove',e=>{
  const r=CANVAS.getBoundingClientRect();
  const sx=GW/r.width,sy=GH/r.height;
  G.mouseX=clamp((e.clientX-r.left)*sx,0,GW);
  G.mouseY=clamp((e.clientY-r.top)*sy,0,GH);
});

CANVAS.addEventListener('mousedown',e=>{
  e.preventDefault();
  G.mouseDown=true;
  const r=CANVAS.getBoundingClientRect();
  const sx=GW/r.width,sy=GH/r.height;
  G.mouseX=clamp((e.clientX-r.left)*sx,0,GW);
  G.mouseY=clamp((e.clientY-r.top)*sy,0,GH);
  if(G.screen==='playing'&&!G.showOverlay) playerSwing();
});
CANVAS.addEventListener('mouseup',()=>{G.mouseDown=false;});

CANVAS.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];G.touchId=t.identifier;
  const r=CANVAS.getBoundingClientRect();
  const sx=GW/r.width,sy=GH/r.height;
  G.mouseX=clamp((t.clientX-r.left)*sx,0,GW);
  G.mouseY=clamp((t.clientY-r.top)*sy,0,GH);
  if(G.screen==='playing'&&!G.showOverlay) playerSwing();
},{passive:false});

CANVAS.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===G.touchId){
      const r=CANVAS.getBoundingClientRect();
      const sx=GW/r.width,sy=GH/r.height;
      G.mouseX=clamp((t.clientX-r.left)*sx,0,GW);
      G.mouseY=clamp((t.clientY-r.top)*sy,0,GH);
    }
  }
},{passive:false});

CANVAS.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){if(t.identifier===G.touchId)G.touchId=null;}
});

document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){
    e.preventDefault();
    if(G.screen==='title')startGame();
    else if(G.screen==='gameover')startGame();
    else if(G.screen==='playing'&&!G.showOverlay) playerSwing();
  }
  if(e.key==='Escape'){
    if(G.showOverlay && G.runPhase==='playing'){closeOverlay();}
    else if(!G.showOverlay && G.runActive && G.runPhase==='playing'){togglePause();}
    else if(G.showOverlay && G.screen==='gameover'){G.showOverlay=false;OV.innerHTML='';backToTitle();}
    else if(G.showOverlay && (G.runPhase==='path'||G.runPhase==='result')){closeOverlay();}
  }
});

// ─── BOOT ───────────────────────────────────────────────────────────────────

loadGame();
G.screen='title';
showOverlay('title');
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
