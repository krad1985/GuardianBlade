const CFG={
  playerSpeed:280,swordLen:130,swordW:18,swordDmg:25,

// ═══ 背包/裝備 ═══
const INV={
  weapon:null,helmet:null,armor:null,cape:null,gloves:null,boots:null,
  items:[],skills:[],equippedSkills:[],
  itemSlotMax:4,skillSlotMax:8,
  getWeapon(){return this.weapon||WEAPONS[0]},
  getWeaponLv(){return this.weapon?.lv||0},
  equip(type,item){
    if(type==='weapon')this.weapon=item;
    else if(type==='helmet')this.helmet=item;
    else if(type==='armor')this.armor=item;
    else if(type==='cape')this.cape=item;
    else if(type==='gloves')this.gloves=item;
    else if(type==='boots')this.boots=item;
  },
  hasEquip(id){return[this.weapon,this.helmet,this.armor,this.cape,this.gloves,this.boots].some(e=>e&&e.id===id)},
  addItem(itm){if(this.items.length<this.itemSlotMax){this.items.push({...itm});return true}return false},
  addSkill(sk){if(!this.skills.find(x=>x.id===sk.id)){this.skills.push({...sk});return true}return false},
  toggleSkill(id){
    const i=this.equippedSkills.indexOf(id);
    if(i>=0)this.equippedSkills.splice(i,1);
    else if(this.equippedSkills.length<this.skillSlotMax&&this.skills.find(s=>s.id===id))this.equippedSkills.push(id);
  },
  useItem(idx){
    if(idx<0||idx>=this.items.length)return null;
    const it=this.items[idx];
    if(it.type==='consumable'){this.items.splice(idx,1);return it;}
    if(it.type==='buff'){this.items.splice(idx,1);return it;}
    return null;
  },
  calcStats(){
    const w=this.getWeapon(),wl=this.getWeaponLv(),wm=1+wl*0.2;
    let s={
      atk:CFG.swordDmg*w.atk*wm, ran:CFG.swordLen*w.ran*wm,
      spd:1, mspd:1, crit:0, critDmg:1.5, def:0, dodge:0,
      goldMult:1, dropRate:1, hpBonus:0,
    };
    for(const eq of[this.helmet,this.armor,this.cape,this.gloves,this.boots]){
      if(!eq)continue;
      const em=1+(eq.lv||0)*0.2;
      if(eq.crit)s.crit+=eq.crit*em;
      if(eq.def)s.def+=eq.def*em;
      if(eq.hp)s.hpBonus+=eq.hp*em;
      if(eq.spd)s.mspd*=1+eq.spd*em/100;
      if(eq.dodge)s.dodge+=eq.dodge*em;
      if(eq.aspd)s.spd*=1+eq.aspd*em/100;
      if(eq.atk)s.atk*=1+eq.atk*em/100;
      if(eq.all){s.atk*=1+eq.all*em/100;s.mspd*=1+eq.all*em/100;s.crit+=eq.all*em;s.def+=eq.all*em/2;s.dodge+=eq.all*em/2;}
    }
    s.atk*=1+PROG.permAtkBonus*0.05;
    s.hpBonus+=PROG.permHpBonus*5;
    if(G.buffs.crit)s.crit+=G.buffs.crit;
    if(G.buffs.atk)s.atk*=1+G.buffs.atk/100;
    if(G.buffs.drop)s.dropRate*=1+G.buffs.drop/100;
    if(G.buffs.gold)s.goldMult*=1+G.buffs.gold/100;
    if(G.buffs.def)s.def+=G.buffs.def;
    if(G.buffs.aspd)s.spd*=1+G.buffs.aspd/100;
    return s;
  },
  reset(){
    this.weapon={...WEAPONS[0],lv:0};
    this.helmet=null;this.armor=null;this.cape=null;this.gloves=null;this.boots=null;
    this.items=[];this.skills=[];this.equippedSkills=[];
    this.itemSlotMax=PROG.permItemSlots;this.skillSlotMax=PROG.permSkillSlots;
  },
  getEqList(){
    const r=[];
    if(this.weapon)r.push({...this.weapon,slot:'weapon'});
    if(this.helmet)r.push({...this.helmet,slot:'helmet'});
    if(this.armor)r.push({...this.armor,slot:'armor'});
    if(this.cape)r.push({...this.cape,slot:'cape'});
    if(this.gloves)r.push({...this.gloves,slot:'gloves'});
    if(this.boots)r.push({...this.boots,slot:'boots'});
    return r;
  }
};

// ═══ 輸入 ═══
const inp={x:GW/2,y:GH-100,active:false,swing:false,touchId:null};
$.addEventListener('mousemove',e=>{const r=$.getBoundingClientRect();inp.x=(e.clientX-r.left)/r.width*GW;inp.y=(e.clientY-r.top)/r.height*GH;inp.active=true});
$.addEventListener('mousedown',()=>inp.swing=true);
$.addEventListener('mouseup',()=>inp.swing=false);
$.addEventListener('mouseleave',()=>inp.active=false);
$.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0],r=$.getBoundingClientRect();inp.x=(t.clientX-r.left)/r.width*GW;inp.y=(t.clientY-r.top)/r.height*GH;inp.active=true;inp.swing=true;inp.touchId=t.identifier},{passive:false});
$.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(inp.touchId===null||t.identifier===inp.touchId){const r=$.getBoundingClientRect();inp.x=(t.clientX-r.left)/r.width*GW;inp.y=(t.clientY-r.top)/r.height*GH;inp.active=true;inp.touchId=t.identifier;break}},{passive:false});
$.addEventListener('touchend',e=>{e.preventDefault();inp.swing=false;for(const t of e.changedTouches)if(t.identifier===inp.touchId){inp.touchId=null;break}if(e.touches.length===0)inp.active=false},{passive:false});

// ═══ 玩家 ═══
const PL={x:GW/2,y:GH-120,tx:GW/2,ty:GH-120,r:18,ang:-Math.PI/2,swA:0,swinging:false,swT:0,swCD:0,
reset(){this.x=GW/2;this.y=GH-120;this.tx=this.x;this.ty=this.y;this.swinging=false;this.swT=0;this.swCD=0},
update(dt){
  if(inp.active){this.tx=cl(inp.x,50,GW-50);this.ty=cl(inp.y,GH*0.35,GH-50)}
  const dx=this.tx-this.x,dy=this.ty-this.y,dd=Math.hypot(dx,dy);
  if(dd>2){const st=CFG.playerSpeed*INV.calcStats().mspd*dt;this.x+=dx/dd*Math.min(st,dd);this.y+=dy/dd*Math.min(st,dd)}
  this.ang=Math.atan2(this.ty-this.y,this.tx-this.x);
  if(this.swCD>0)this.swCD-=dt;
  if(this.swinging){this.swT+=dt;const p=this.swT/CFG.swordSwing;if(p>=1){this.swinging=false;this.swT=0}else this.swA=-Math.PI*0.6+Math.sin(p*Math.PI)*Math.PI*1.2}
  if(inp.swing&&!this.swinging&&this.swCD<=0){
    this.swinging=true;this.swT=0;this.swCD=CFG.swordCD/INV.calcStats().spd;
    this.swA=-Math.PI*0.6;swordHit();inp.swing=false;
  }
  if(this.swinging&&Math.random()<0.5){const a=this.ang+this.swA,l=CFG.swordLen*INV.calcStats().ran;pt.push(new PT(this.x+Math.cos(a)*l,this.y+Math.sin(a)*l,r(-20,20),r(-20,20),'rgba(180,220,255,0.5)',r(0.15,0.3),r(3,5)))}
},
draw(CX){
  const w=INV.getWeapon(),rc=gRC(w.rarity);
  CX.save();CX.translate(this.x,this.y);
  const au=CX.createRadialGradient(0,0,5,0,0,40);
  au.addColorStop(0,'rgba(180,220,255,0.1)');au.addColorStop(1,'rgba(180,220,255,0)');
  CX.fillStyle=au;CX.beginPath();CX.arc(0,0,40,0,Math.PI*2);CX.fill();
  CX.shadowColor=rc;CX.shadowBlur=12;
  const bg=CX.createLinearGradient(-this.r,-this.r,this.r,this.r);
  bg.addColorStop(0,'#5a7a9a');bg.addColorStop(0.5,'#3a5a7a');bg.addColorStop(1,'#2a3a5a');
  CX.fillStyle=bg;CX.beginPath();CX.arc(0,0,this.r,0,Math.PI*2);CX.fill();

let enemies=[];
class EM{
  constructor(wv,forceType){
    const sd=ri(0,3);
    if(sd===0){this.x=-30;this.y=r(GH*0.15,GH*0.7)}
    else if(sd===1){this.x=GW+30;this.y=r(GH*0.15,GH*0.7)}
    else if(sd===2){this.x=r(0,GW);this.y=-30}
    else{this.x=r(0,GW);this.y=GH+30}

    // 決定類型: 可強制指定(菁英/Boss)
    this.etype=forceType||'n';
    const wm=1+wv*0.15;

    if(this.etype==='b'){ // Boss
      const stage=Math.floor((wv-1)/STAGE_WAVES)+1;
      this.r=38+stage*2;
      this.maxHP=CFG.baseEnemyHP*8*wm*(1+stage*0.3);
      this.spd=CFG.enemySpd*0.55;
      this.dmg=25+wv*1.5;
      this.color='#d02050';
      this.gv=80+stage*20;
      this.etype='b';
    }else if(this.etype==='e'){ // 菁英
      this.r=24;
      this.maxHP=CFG.baseEnemyHP*3*wm;
      this.spd=CFG.enemySpd*0.8*(1+wv*0.02);
      this.dmg=14+wv*0.8;
      this.color='#d4a030';
      this.gv=30+Math.floor(wv*0.5);
    }else{
      const ro=Math.random();
      if(ro<0.55){this.r=14;this.maxHP=CFG.baseEnemyHP*wm;this.spd=CFG.enemySpd*(1+wv*0.03);this.dmg=8+wv*0.5;this.color='#d43a3a';this.gv=6;this.etype='n'}
      else if(ro<0.8){this.r=10;this.maxHP=CFG.baseEnemyHP*0.6*(1+wv*0.12);this.spd=CFG.enemySpd*1.6*(1+wv*0.03);this.dmg=5+wv*0.3;this.color='#d4a63a';this.gv=4;this.etype='f'}
      else{this.r=22;this.maxHP=CFG.baseEnemyHP*2.5*(1+wv*0.18);this.spd=CFG.enemySpd*0.6*(1+wv*0.02);this.dmg=15+wv;this.color='#4a3ad4';this.gv=14;this.etype='h'}
    }
    this.hp=this.maxHP;this.dmgCD=0;this.flash=0;this.kx=0;this.ky=0;
  }
  takeDmg(d,ka){
    this.hp-=d;this.flash=.12;this.kx=Math.cos(ka||0)*100;this.ky=Math.sin(ka||0)*100;
    DN.push({x:this.x+r(-8,8),y:this.y-10,txt:Math.floor(d),life:.7,max:.7});
    if(this.hp<=0){this.die();return true}return false;
  }
  die(){
    G.kills++;G.combo++;G.comboTimer=1.5;
    const st=INV.calcStats();
    const ga=Math.floor(this.gv*st.goldMult*(1+G.wave*0.05));
    G.gold+=ga;G.totalGold+=ga;G.score+=Math.floor(this.maxHP*0.5);
    const ptCount=this.etype==='b'?20:(this.etype==='e'?10:3);
    for(let i=0;i<ptCount;i++)pt.push(new PT(this.x,this.y,r(-60,60),r(-80,-20),`hsl(45,100%,${60+r(0,30)}%)`,r(.4,.7),r(2,4)));
    DN.push({x:this.x+r(-10,10),y:this.y-20,txt:`+${ga}💰`,life:1,max:1,isGold:true});
    // Boss/菁英保證掉落
    if(this.etype==='b'){forceDrop(this.x,this.y,'legendary');forceDrop(this.x,this.y,'epic')}
    else if(this.etype==='e'){if(Math.random()<0.6)forceDrop(this.x,this.y,'rare')}
    else tryDrop(this.x,this.y);
    G.screenShake=Math.max(G.screenShake,this.etype==='b'?12:(this.etype==='e'?5:2));
    if(G.combo>8&&Math.random()<0.3)G.slowMo=.08;
  }
  update(dt){
    if(this.flash>0)this.flash-=dt;
    const dx=CS.x-this.x,dy=CS.y-this.y,dd=Math.hypot(dx,dy);
    if(dd>0){this.x+=dx/dd*this.spd*dt+this.kx*dt*3;this.y+=dy/dd*this.spd*dt+this.ky*dt*3}
    this.kx*=.85;this.ky*=.85;
    if(dd<this.r+40){if(this.dmgCD<=0){const st=INV.calcStats(),dmgRed=st.def/100;CS.takeDmg(this.dmg*(1-Math.min(dmgRed,.8)));this.dmgCD=.8;for(let i=0;i<5;i++)pt.push(new PT(CS.x,CS.y,r(-80,80),r(-80,80),'#f44',r(.3,.5),r(3,5)))}}
    if(this.dmgCD>0)this.dmgCD-=dt;
  }
  draw(CX){
    CX.save();CX.translate(this.x,this.y);
    const cl=this.flash>0?'#fff':this.color;
    CX.shadowColor=cl;CX.shadowBlur=this.flash>0?15:6;
    // Boss有大型光暈
    if(this.etype==='b'){CX.shadowBlur=40;CX.shadowColor='#f44'}
    else if(this.etype==='e'){CX.shadowBlur=20;CX.shadowColor='#fa4'}
    const bg=CX.createRadialGradient(-2,-2,2,0,0,this.r);
    bg.addColorStop(0,lt(cl,40));bg.addColorStop(1,cl);
    CX.fillStyle=bg;CX.beginPath();CX.arc(0,0,this.r,0,Math.PI*2);CX.fill();
    CX.shadowBlur=0;
    // 菁英/Boss標記
    if(this.etype==='b'){CX.fillStyle='#fff';CX.font='bold 14px sans-serif';CX.textAlign='center';CX.textBaseline='middle';CX.fillText('👑',0,-this.r-12)}
    else if(this.etype==='e'){CX.fillStyle='#ff0';CX.font='12px sans-serif';CX.textAlign='center';CX.textBaseline='middle';CX.fillText('⭐',0,-this.r-8)}
    CX.fillStyle=this.flash>0?'#000':'#ff0';
    const eo=this.r*0.3;CX.fillRect(-eo-3,-2,4,4);CX.fillRect(eo-1,-2,4,4);
    if(this.hp<this.maxHP){const bw=this.r*2.5,bh=3;CX.fillStyle='rgba(0,0,0,0.5)';CX.roundRect(-bw/2,-this.r-7,bw,bh,1.5);CX.fill();CX.fillStyle=this.hp/this.maxHP>0.5?'#4a4':'#f44';CX.roundRect(-bw/2,-this.r-7,bw*(this.hp/this.maxHP),bh,1.5);CX.fill()}
    CX.restore();
  }
}

const skTimers={};
let aoeRings=[],lightnings=[];

function updSkills(dt){
  for(const sid of INV.equippedSkills){
    const sk=SKILLS.find(s=>s.id===sid);if(!sk)continue;
    if(!skTimers[sid])skTimers[sid]=0;skTimers[sid]-=dt;
    if(skTimers[sid]>0)continue;skTimers[sid]=sk.cd;activateSkill(sk);
  }
}
function activateSkill(sk){
  if(sk.type==='projectile'){
    let ne=null,nd=Infinity;
    for(const e of enemies){const dd=d(PL,e);if(dd<nd){nd=dd;ne=e}}
    if(!ne)return;
    projs.push(new PR(PL.x,PL.y,ne.x,ne.y,350,sk.dmg,sk.color,sk.id));
  }else if(sk.type==='aoe'){
    const rad=sk.rad||120;
    for(const e of enemies){
      if(d(PL,e)<rad+e.r){e.takeDmg(sk.dmg,Math.atan2(e.y-PL.y,e.x-PL.x));if(sk.slow)e.spd*=(1-sk.slow)}
    }
    for(let i=0;i<12;i++){const a=r(0,Math.PI*2),rr=r(0,rad);pt.push(new PT(PL.x+Math.cos(a)*rr,PL.y+Math.sin(a)*rr,r(-20,20),r(-20,20),sk.color,r(.3,.6),r(3,8)))}
    aoeRings.push({x:PL.x,y:PL.y,r:0,maxR:rad,life:.4,color:sk.color});
    if(sk.id==='heal'){CS.hp=Math.min(CS.maxHP,CS.hp+(sk.heal||35));for(let i=0;i<10;i++)pt.push(new PT(CS.x,CS.y,r(-40,40),r(-40,40),'#4f8',r(.3,.6),r(3,5)));DN.push({x:CS.x,y:CS.y-30,txt:`+${sk.heal||35}❤️`,life:1,max:1})}
    if(sk.id==='meteor'){for(let i=0;i<8;i++)pt.push(new PT(PL.x+r(-60,60),PL.y-40+r(-20,20),r(-20,20),r(100,200),'#f84',r(.4,.7),r(4,8)))}
    if(sk.id==='blade_storm'){for(let i=0;i<20;i++){const a=r(0,Math.PI*2),rr=r(0,rad);pt.push(new PT(PL.x+Math.cos(a)*rr,PL.y+Math.sin(a)*rr,r(-40,40),r(-40,40),'#8cf',r(.3,.6),r(3,8)))}}
  }else if(sk.type==='target'){
    const cnt=sk.cnt||3;const sorted=[...enemies].sort((a,b)=>d(PL,a)-d(PL,b));
    for(let i=0;i<Math.min(cnt,sorted.length);i++){const e=sorted[i];e.takeDmg(sk.dmg,Math.atan2(e.y-PL.y,e.x-PL.x));for(let j=0;j<6;j++)pt.push(new PT(e.x,e.y,r(-30,30),r(-60,-10),'#ff0',r(.2,.4),r(2,5)));lightnings.push({x1:e.x-r(-15,15),y1:e.y-40,x2:e.x,y2:e.y,life:.15})}
  }
}

// ═══ 掉落系統 ═══
let groundItems=[];
class GI{
  constructor(x,y,item,rarity,isUpgrade){
    this.x=x;this.y=y;this.item=item;this.rarity=rarity;this.bob=r(0,Math.PI*2);this.life=12;this.r=12;this.isUpgrade=isUpgrade||false;
  }
  update(dt){
    this.bob+=dt*3;this.life-=dt;
    if(d(this,PL)<40){this.collect();return}
  }
  collect(){
    const it=this.item;
    if(it.type==='weapon'){
      const w=WEAPONS.find(x=>x.id===it.id);
      if(w){const existing=INV.hasEquip(w.id);if(!existing){INV.weapon={...w,lv:it.lv||0};DN.push({x:this.x,y:this.y-15,txt:`🗡️ ${w.name}${it.lv?`+${it.lv}`:''} 獲得!`,life:1.2,max:1.2,big:true})}else{G.gold+=15;DN.push({x:this.x,y:this.y-15,txt:'重複轉金幣 +15💰',life:1.2,max:1.2,isGold:true})}}
    }else if(it.type==='equip'){
      const eq=EQUIPS.find(x=>x.id===it.id);
      if(eq){const existing=INV.hasEquip(eq.id);if(!existing){INV.equip(eq.type,{...eq,lv:it.lv||0});DN.push({x:this.x,y:this.y-15,txt:`🛡️ ${eq.name}${it.lv?`+${it.lv}`:''} 獲得!`,life:1.2,max:1.2,big:true})}else{G.gold+=20;DN.push({x:this.x,y:this.y-15,txt:'重複轉金幣 +20💰',life:1.2,max:1.2,isGold:true})}}
    }else if(it.type==='skill'){
      const sk=SKILLS.find(x=>x.id===it.id);
      if(sk&&INV.addSkill(sk)){if(!INV.equippedSkills.includes(sk.id)&&INV.equippedSkills.length<INV.skillSlotMax)INV.equippedSkills.push(sk.id);DN.push({x:this.x,y:this.y-15,txt:`✨ ${sk.name} 習得!`,life:1.2,max:1.2,big:true})}
    }else if(it.type==='item'){
      const im=ITEMS.find(x=>x.id===it.id);
      if(im&&INV.addItem(im)){DN.push({x:this.x,y:this.y-15,txt:`${im.icon} ${im.name}`,life:1.2,max:1.2,big:true})}
    }else if(it.type==='soul'){
      const amt=it.amt||1;PROG.soulFragments+=amt;saveProg();
      DN.push({x:this.x,y:this.y-15,txt:`💎 靈魂碎片 +${amt}`,life:1.5,max:1.5,big:true,color:'#b4f'});
    }
    for(let i=0;i<8;i++){const c=gRC(this.rarity);pt.push(new PT(this.x,this.y,r(-60,60),r(-60,60),c,r(.3,.6),r(2,5)))}
    this.life=0;
  }
  draw(CX){
    if(this.life<=0)return;
    const al=Math.min(1,this.life/3),rc=RR[this.rarity]||RR.common,by=this.y+Math.sin(this.bob)*3;
    CX.save();CX.globalAlpha=al;
    const gl=CX.createRadialGradient(this.x,by,2,this.x,by,25);
    gl.addColorStop(0,rc.g);gl.addColorStop(1,'rgba(0,0,0,0)');
    CX.fillStyle=gl;CX.beginPath();CX.arc(this.x,by,25,0,Math.PI*2);CX.fill();
    CX.shadowColor=rc.c;CX.shadowBlur=15;
    let icon='💎';if(this.item.type==='weapon')icon='🗡️';else if(this.item.type==='equip')icon='🛡️';else if(this.item.type==='skill')icon='📜';else if(this.item.type==='item'){const im=ITEMS.find(x=>x.id===this.item.id);icon=im?im.icon:'📦'}else if(this.item.type==='soul')icon='💎';
    if(this.isUpgrade)icon='⬆️';
    CX.font='20px sans-serif';CX.textAlign='center';CX.textBaseline='middle';CX.fillText(icon,this.x,by);
    CX.restore();
  }
}

function tryDrop(x,y){
  const st=INV.calcStats();
  const chance=Math.min(.22,.06+G.wave*.01)*st.dropRate;
  if(Math.random()>chance)return;
  const rarity=rollR();
  const rv=Math.random();
  let isUpgrade=false;
  if(rv<0.3){
    const cand=WEAPONS.filter(w=>w.rarity===rarity);
    if(cand.length){const pick=cand[ri(0,cand.length-1)];
      const existing=INV.hasEquip(pick.id);
      const lv=existing?1:0;
      groundItems.push(new GI(x,y,{type:'weapon',id:pick.id,lv},rarity,existing));
    }
  }else if(rv<0.5){
    const cand=EQUIPS.filter(e=>e.rarity===rarity);
    if(cand.length){const pick=cand[ri(0,cand.length-1)];
      const existing=INV.hasEquip(pick.id);
      const lv=existing?1:0;
      groundItems.push(new GI(x,y,{type:'equip',id:pick.id,lv},rarity,existing));
    }
  }else if(rv<0.7){
    const cand=SKILLS.filter(s=>s.rarity===rarity&&!INV.skills.find(x=>x.id===s.id));
    if(cand.length){const pick=cand[ri(0,cand.length-1)];groundItems.push(new GI(x,y,{type:'skill',id:pick.id},rarity,false))}
  }else if(rv<0.9){
    const cand=ITEMS.filter(i=>i.rarity===rarity);
    if(cand.length){const pick=cand[ri(0,cand.length-1)];groundItems.push(new GI(x,y,{type:'item',id:pick.id},rarity,false))}
  }else{
    const amt=rarity==='legendary'?5:rarity==='epic'?3:rarity==='rare'?2:1;
    groundItems.push(new GI(x,y,{type:'soul',amt},rarity,false))
  }
}

// ═══ 揮劍碰撞 ═══
function swordHit(){
  const a=PL.ang,st=a-Math.PI*0.6,en=a+Math.PI*0.6;
  const stats=INV.calcStats(),len=stats.ran;
  for(const e of enemies){
    if(!e||e.hp<=0)continue;
    const dx=e.x-PL.x,dy=e.y-PL.y,dd=Math.hypot(dx,dy);
    if(dd>len+e.r||dd<15)continue;
    let da=Math.atan2(dy,dx)-st;while(da<0)da+=Math.PI*2;
    if(da>en-st)continue;
    let dmg=stats.atk;if(Math.random()*100<stats.crit)dmg*=stats.critDmg;
    const killed=e.takeDmg(dmg,Math.atan2(dy,dx));
    for(let i=0;i<3;i++)pt.push(new PT(e.x,e.y,r(-40,40),r(-40,40),'#aacfff',r(.15,.3),r(2,4)));
    if(killed)G.screenShake=Math.max(G.screenShake,3);
    const w=INV.getWeapon();
    if(w.fire&&!killed)e.flash=.3;
    if(w.slow&&!killed)e.spd*=0.8;
  }
}

// ═══ 粒子系統 ═══
let pt=[],DN=[];
class PT{
  constructor(x,y,vx,vy,clr,life,sz){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.clr=clr;this.life=life;this.max=life;this.sz=sz||r(2,4)}
  update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.vx*=.96;this.vy*=.96;this.vy+=100*dt;this.life-=dt}
  draw(CX){const a=this.life/this.max;CX.globalAlpha=a;CX.fillStyle=this.clr;CX.shadowBlur=0;CX.beginPath();CX.arc(this.x,this.y,this.sz*(.3+.7*a),0,Math.PI*2);CX.fill();CX.globalAlpha=1}
}
function lt(hex,a){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`}

// ═══ 波次管理 ═══
const WM={timer:0,spawned:0,maxSpawn:0,eliteSpawned:false,bossSpawned:false,
reset(){this.timer=0;this.spawned=0;this.maxSpawn=0;this.eliteSpawned=false;this.bossSpawned=false},
start(n){
  G.wave=n;
  G.waveInStage=((n-1)%STAGE_WAVES)+1;
  G.stage=Math.floor((n-1)/STAGE_WAVES)+1;
  this.maxSpawn=5+n*3;
  this.spawned=0;this.timer=0;this.eliteSpawned=false;this.bossSpawned=false;
},
update(dt){
  if(G.state!=='playing')return;
  if(this.spawned>=this.maxSpawn&&enemies.length===0){
    // 關卡完成(第5波) → 休息
    if(G.waveInStage===STAGE_WAVES){
      G.state='rest';
      DN.push({x:GW/2,y:GH*0.3,txt:`🎯 第 ${G.stage} 關卡完成！`,life:2.5,max:2.5,big:true,color:'#fa4'});
    }else{
      // 隨機建築 (不再是固定每3波)
      let buildChance=0.2+G.wavesSinceBuilding*0.08;
      if(Math.random()<buildChance){G.state='building';G.wavesSinceBuilding=0}
      else{G.state='waveComplete';G.wavesSinceBuilding++}
    }
    return;
  }
  if(this.spawned<this.maxSpawn&&enemies.length<40){
    this.timer-=dt;
    if(this.timer<=0){
      // Boss關卡 (每3個關卡 = wave 15,30,45...)
      const isBossWave=G.wave%15===0;
      const isEliteWave=G.waveInStage===STAGE_WAVES&&!isBossWave;
      // 只有在關卡最後一波才產Boss/菁英
      if(isBossWave&&!this.bossSpawned&&this.spawned>=this.maxSpawn-1){
        enemies.push(new EM(G.wave,'b'));this.bossSpawned=true;
      }else if(isEliteWave&&!this.eliteSpawned&&this.spawned>=this.maxSpawn-2){
        enemies.push(new EM(G.wave,'e'));this.eliteSpawned=true;
      }else{
        enemies.push(new EM(G.wave));
      }
      this.spawned++;this.timer=Math.max(.25,1.2-G.wave*.03);
    }
  }
}};

// ═══ 更新 ═══
function update(dt){
  G.time+=dt;G.dt=dt;
  let edt=dt;if(G.slowMo>0){edt*=.3;G.slowMo-=dt}
  if(G.comboTimer>0){G.comboTimer-=dt;if(G.comboTimer<=0)G.combo=0}
  if(G.screenShake>0)G.screenShake*=.92;if(G.screenShake<.1)G.screenShake=0;
  if(G.state==='playing'){
    PL.update(edt);CS.update(edt);WM.update(edt);updSkills(edt);
    for(const e of enemies)e.update(edt);
    enemies=enemies.filter(e=>e.hp>0);
    for(const p of projs)p.update(edt);
    projs=projs.filter(p=>p.alive);
  }
  for(const gi of groundItems)gi.update(dt);
  groundItems=groundItems.filter(gi=>gi.life>0);
  for(const p of pt)p.update(dt);pt=pt.filter(p=>p.life>0);
  for(const n of DN){n.y-=45*dt;n.life-=dt}
  DN=DN.filter(n=>n.life>0);
  for(const r of aoeRings){r.r+=(r.maxR-r.r)*dt*5;r.life-=dt}
  aoeRings=aoeRings.filter(r=>r.life>0);
  for(const l of lightnings)l.life-=dt;
  lightnings=lightnings.filter(l=>l.life>0);
}

// ═══ 繪圖 ═══
function draw(){
  C.clearRect(0,0,W,H);C.save();
  if(G.screenShake>.5){C.translate(r(-G.screenShake,G.screenShake)*S,r(-G.screenShake,G.screenShake)*S)}
  C.scale(S,S);
  if(G.state==='menu'){drawMenu();C.restore();return}
  // 背景
  const bg=C.createLinearGradient(0,0,0,GH);
  bg.addColorStop(0,'#12121e');bg.addColorStop(0.5,'#1a1a2e');bg.addColorStop(1,'#0f0f1a');
  C.fillStyle=bg;C.fillRect(0,0,GW,GH);
  C.strokeStyle='rgba(60,60,90,0.12)';C.lineWidth=1;
  for(let x=0;x<GW;x+=60){C.beginPath();C.moveTo(x,0);C.lineTo(x,GH);C.stroke()}
  for(let y=0;y<GH;y+=60){C.beginPath();C.moveTo(0,y);C.lineTo(GW,y);C.stroke()}
  const hl=C.createRadialGradient(CS.x,CS.y,10,CS.x,CS.y,200);
  hl.addColorStop(0,'rgba(100,60,180,0.08)');hl.addColorStop(1,'rgba(100,60,180,0)');
  C.fillStyle=hl;C.beginPath();C.arc(CS.x,CS.y,200,0,Math.PI*2);C.fill();
  for(const gi of groundItems)gi.draw(C);
  CS.draw(C);
  for(const e of enemies)e.draw(C);
  for(const r of aoeRings){C.save();C.globalAlpha=r.life/.4*.5;C.strokeStyle=r.color;C.lineWidth=3;C.beginPath();C.arc(r.x,r.y,r.r,0,Math.PI*2);C.stroke();C.restore()}
  for(const l of lightnings){C.save();C.globalAlpha=l.life/.15;C.strokeStyle='#ff0';C.lineWidth=3;C.shadowColor='#ff0';C.shadowBlur=15;C.beginPath();C.moveTo(l.x1,l.y1);C.lineTo(l.x2,l.y2);C.stroke();C.restore()}
  for(const p of projs)p.draw(C);
  if(G.state!=='gameOver')PL.draw(C);
  for(const p of pt)p.draw(C);
  for(const n of DN){
    C.save();C.globalAlpha=Math.max(0,n.life/n.max);
    C.textAlign='center';C.textBaseline='middle';
    C.font=n.big?'bold 18px sans-serif':(n.isGold?'bold 14px sans-serif':'bold 12px sans-serif');
    C.fillStyle=n.color||(n.isGold?'#fd4':'#fff');
    C.shadowColor=n.color?n.color+'66':(n.isGold?'rgba(255,200,0,0.5)':'rgba(255,255,255,0.3)');
    C.shadowBlur=n.big?10:4;C.fillText(n.txt,n.x,n.y);C.restore();
  }
  if(G.state!=='gameOver'&&G.state!=='menu'&&G.state!=='rest')drawHUD();
  if(G.state==='waveComplete')drawWaveComplete();
  if(G.state==='building')drawBuilding();
  if(G.state==='rest')drawRest();
  if(G.state==='gameOver')drawGameOver();
  if(G.state==='permUpgrade')drawPermUpgrade();
  C.restore();
}

// ═══ 點擊處理 ═══
let mx,my;
$.addEventListener('click',e=>{const r=$.getBoundingClientRect();mx=(e.clientX-r.left)/r.width*GW;my=(e.clientY-r.top)/r.height*GH;handleClick(mx,my)});
$.addEventListener('touchend',e=>{e.preventDefault();if(e.changedTouches.length){const t=e.changedTouches[0],r=$.getBoundingClientRect();mx=(t.clientX-r.left)/r.width*GW;my=(t.clientY-r.top)/r.height*GH;handleClick(mx,my)}},{passive:false});

function handleClick(cx,cy){
  if(G.state==='menu'){
    if(cx>GW/2-100&&cx<GW/2+100&&cy>GH*0.66&&cy<GH*0.66+50)startGame();
    if(cx>GW/2-100&&cx<GW/2+100&&cy>GH*0.75&&cy<GH*0.75+44)G.state='permUpgrade';
    return;
  }
  if(G.state==='permUpgrade'){
    const pw=480,ph=500,px=(GW-pw)/2,py=(GH-ph)/2,startY=py+70,itemH=46;
    for(let i=0;i<PERM_UPGRADES.length;i++){
      const pu=PERM_UPGRADES[i],lv=pu.get(),cost=pu.cost(lv),can=PROG.soulFragments>=cost,maxed=lv>=pu.max,y=startY+i*itemH;
      if(!maxed&&can&&cx>px+15&&cx<px+pw-15&&cy>y&&cy<y+itemH-4){
        PROG.soulFragments-=cost;pu.set(lv+1);saveProg();return;
      }
    }
    if(cx>px+pw/2-50&&cx<px+pw/2+50&&cy>py+ph-48&&cy<py+ph-14){G.state='menu';return}
    return;
  }
  // 休息站
  if(G.state==='rest'){
    const pw=440,ph=440,px=(GW-pw)/2,py=(GH-ph)/2,startY=py+100,itemH=64;
    for(let i=0;i<restChoices.length;i++){
      const y=startY+i*itemH;
      if(cx>px+20&&cx<px+pw-20&&cy>y&&cy<y+itemH-4){
        applyRestChoice(restChoices[i].id);restChoices=[];nextWave();return;
      }
    }
    if(cx>px+pw/2-60&&cx<px+pw/2+60&&cy>py+ph-50&&cy<py+ph-14){restChoices=[];nextWave();return}
    return;
  }
  if(G.state==='waveComplete'){
    const pw=420,ph=520,px=(GW-pw)/2,py=(GH-ph)/2;
    const tabs=[{id:'stats',label:'⚡強化'},{id:'bag',label:'📦道具'},{id:'weapons',label:'🗡️裝備'},{id:'skills',label:'📜技能'}];
    const tabY=py+72;
    tabs.forEach((t,i)=>{const tx=px+12+i*100,tw=96,th=26;if(cx>tx&&cx<tx+tw&&cy>tabY&&cy<tabY+th)upgradeTab=t.id});
    if(upgradeTab==='stats'){
      const startY=py+106,itemH=42;
      for(let i=0;i<UPGRADES.length;i++){const u=UPGRADES[i],cost=upgCost(u),can=G.gold>=cost,maxed=u.lv>=u.max,y=startY+i*itemH;if(!maxed&&can&&cx>px+15&&cx<px+pw-15&&cy>y&&cy<y+itemH-4){G.gold-=cost;u.lv++;u.apply();return}}
    }else if(upgradeTab==='bag'){
      const startY=py+115,itemH=42;
      for(let i=0;i<INV.items.length;i++){const y=startY+i*itemH;if(cx>px+15&&cx<px+pw-15&&cy>y&&cy<y+itemH-4){const it=INV.useItem(i);if(it){if(it.type==='consumable'){CS.hp=Math.min(CS.maxHP,CS.hp+(it.heal||30));DN.push({x:CS.x,y:CS.y-30,txt:`+${it.heal||30}❤️`,life:1,max:1,color:'#4f8'})}else if(it.type==='buff'){const bufMap={crit:'crit',atk:'atk',drop:'drop',gold:'gold',def:'def',aspd:'aspd'};const bk=bufMap[it.buff];if(bk)G.buffs[bk]=(G.buffs[bk]||0)+it.val;DN.push({x:GW/2,y:GH*0.4,txt:`${it.name} 啟動!`,life:1.5,max:1.5,big:true})}}return}}
    }else if(upgradeTab==='weapons'){
      // info only
    }else if(upgradeTab==='skills'){
      const startY=py+115,itemH=42;
      for(let i=0;i<INV.skills.length;i++){const s=INV.skills[i],y=startY+i*itemH;if(cx>px+15&&cx<px+pw-15&&cy>y&&cy<y+itemH-4){INV.toggleSkill(s.id);return}}
    }
    if(cx>px+pw/2-80&&cx<px+pw/2+80&&cy>py+ph-50&&cy<py+ph-12)nextWave();
    return;
  }
  if(G.state==='building'){
    const pw=420,ph=460,px=(GW-pw)/2,py=(GH-ph)/2;
    if(cx>px+pw/2-60&&cx<px+pw/2+60&&cy>py+ph-50&&cy<py+ph-14){currentBuilding=null;shopItems=[];templeSelect=[];buildingProcessed=false;nextWave();return}
    if(currentBuilding==='shop'){
      const startY=py+60,itemH=44;
      for(let i=0;i<shopItems.length;i++){const si=shopItems[i],y=startY+i*itemH;if(cx>px+15&&cx<px+pw-15&&cy>y&&cy<y+itemH-4&&G.gold>=si.cost){
        G.gold-=si.cost;
        if(si.type==='weapon'){const existing=INV.hasEquip(si.item.id);if(!existing){INV.weapon={...si.item,lv:0};DN.push({x:GW/2,y:GH*0.4,txt:`🗡️ ${si.item.name}`,life:1.2,max:1.2,big:true})}else{G.gold+=Math.floor(si.cost*0.5);DN.push({x:GW/2,y:GH*0.4,txt:'已擁有 退50%金幣',life:1.2,max:1.2,isGold:true})}}
        else if(si.type==='equip'){const existing=INV.hasEquip(si.item.id);if(!existing){INV.equip(si.item.type,{...si.item,lv:0});DN.push({x:GW/2,y:GH*0.4,txt:`🛡️ ${si.item.name}`,life:1.2,max:1.2,big:true})}else{G.gold+=Math.floor(si.cost*0.5);DN.push({x:GW/2,y:GH*0.4,txt:'已擁有 退50%金幣',life:1.2,max:1.2,isGold:true})}}
        else if(si.type==='skill'){if(INV.addSkill(si.item)){if(!INV.equippedSkills.includes(si.item.id)&&INV.equippedSkills.length<INV.skillSlotMax)INV.equippedSkills.push(si.item.id);DN.push({x:GW/2,y:GH*0.4,txt:`✨ ${si.item.name}`,life:1.2,max:1.2,big:true})}}
        else if(si.type==='item'){if(INV.addItem(si.item))DN.push({x:GW/2,y:GH*0.4,txt:`📦 ${si.item.name}`,life:1.2,max:1.2,big:true})}
        shopItems.splice(i,1);return;
      }}
    }else if(currentBuilding==='blacksmith'){
      const eqList=INV.getEqList(),startY=py+68,itemH=48;
      for(let i=0;i<eqList.length;i++){const eq=eqList[i],y=startY+i*itemH;const lv=eq.lv||0,cost=20+lv*15;if(cx>px+15&&cx<px+pw-15&&cy>y&&cy<y+itemH-4&&G.gold>=cost){
        G.gold-=cost;const slot=eq.slot;if(slot==='weapon'&&INV.weapon){INV.weapon.lv=(INV.weapon.lv||0)+1} else{const eq2=INV[slot];if(eq2)eq2.lv=(eq2.lv||0)+1}
        DN.push({x:GW/2,y:GH*0.4,txt:`⬆️ ${eq.name} 強化成功!`,life:1.2,max:1.2,big:true});return;
      }}
    }else if(currentBuilding==='temple'){
      const eqSkills=INV.equippedSkills.map(id=>SKILLS.find(s=>s.id===id)).filter(Boolean);
      const startY=py+85,itemH=42;
      for(let i=0;i<eqSkills.length;i++){const sk=eqSkills[i],y=startY+i*itemH;if(cx>px+15&&cx<px+pw-15&&cy>y&&cy<y+itemH-4){
        if(templeSelect.includes(sk.id)){
          if(templeSelect.length===2){
            const rarities=templeSelect.map(id=>{const s=SKILLS.find(x=>x.id===id);return s?R_ORD.indexOf(s.rarity):0});
            const avgRarity=Math.min(R_ORD.length-1,Math.ceil((rarities[0]+rarities[1])/2)+1);
            const cand=SKILLS.filter(s=>R_ORD.indexOf(s.rarity)<=avgRarity&&!INV.skills.find(x=>x.id===s.id)&&!templeSelect.includes(s.id));
            if(cand.length){const result=cand[ri(0,cand.length-1)];INV.addSkill(result);if(!INV.equippedSkills.includes(result.id)&&INV.equippedSkills.length<INV.skillSlotMax)INV.equippedSkills.push(result.id);DN.push({x:GW/2,y:GH*0.4,txt:`✨ ${result.name} 融合成功!`,life:1.5,max:1.5,big:true})}
            for(const sid of templeSelect){const idx=INV.equippedSkills.indexOf(sid);if(idx>=0)INV.equippedSkills.splice(idx,1);const idx2=INV.skills.findIndex(s=>s.id===sid);if(idx2>=0)INV.skills.splice(idx2,1)}
            templeSelect=[];return;
          }
        }else{templeSelect=[sk.id];return}
      }}
    }else if(currentBuilding==='inn'){
      const cost=15+Math.floor((CS.maxHP-CS.hp)/5);
      if(cx>px+pw/2-80&&cx<px+pw/2+80&&cy>py+120&&cy<py+160&&G.gold>=cost&&CS.hp<CS.maxHP){
        G.gold-=cost;CS.hp=CS.maxHP;
        for(let i=0;i<15;i++)pt.push(new PT(CS.x,CS.y,r(-60,60),r(-60,60),'#4f8',r(.3,.6),r(3,6)));
        DN.push({x:CS.x,y:CS.y-40,txt:'HP全恢復!',life:1.5,max:1.5,big:true,color:'#4f8'});
      }
    }
    return;
  }
  if(G.state==='gameOver'){
    if(cx>GW/2-130&&cx<GW/2-10&&cy>GH*0.64&&cy<GH*0.64+45)startGame();
    if(cx>GW/2+10&&cx<GW/2+140&&cy>GH*0.64&&cy<GH*0.64+45)G.state='permUpgrade';
    return;
  }
}

// ═══ 升級定義 ═══
const UPGRADES=[
  {id:'damage',name:'⚔️ 攻擊力',desc:'+20%',base:50,mult:1.6,lv:0,max:20,apply:()=>{CFG.swordDmg*=1.2}},
  {id:'range',name:'📏 劍範圍',desc:'+15%',base:40,mult:1.5,lv:0,max:20,apply:()=>{CFG.swordLen*=1.15}},
  {id:'speed',name:'👟 移速',desc:'+15%',base:30,mult:1.5,lv:0,max:20,apply:()=>{CFG.playerSpeed*=1.15}},
  {id:'hp',name:'❤️ 守護HP',desc:'+30',base:60,mult:1.6,lv:0,max:20,apply:()=>{CFG.centerHP+=30;CS.maxHP=CFG.centerHP}},
  {id:'gold',name:'💰 金幣',desc:'+25%',base:45,mult:1.5,lv:0,max:20,apply:()=>{CFG.goldMult*=1.25}},
  {id:'atkspeed',name:'⚡ 攻速',desc:'-10%CD',base:55,mult:1.6,lv:0,max:20,apply:()=>{CFG.swordCD*=0.9}},
  {id:'itemslot',name:'📦 道具格',desc:'+1格',base:80,mult:2.0,lv:0,max:5,apply:()=>{INV.itemSlotMax++;G.tempItemSlots++}},
  {id:'skillSlot',name:'📜 技能格',desc:'+1格',base:100,mult:2.0,lv:0,max:5,apply:()=>{INV.skillSlotMax++;G.tempSkillSlots++}},
];
function upgCost(u){return Math.floor(u.base*Math.pow(u.mult,u.lv))}

// ═══ 主循環 ═══
let last=0;
function loop(t){
  const dt=Math.min((t-last)/1000,.05);last=t;
  update(dt);draw();requestAnimationFrame(loop);
}
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r=[r];const rad=r[0]||0;this.moveTo(x+rad,y);this.arcTo(x+w,y,x+w,y+h,rad);this.arcTo(x+w,y+h,x,y+h,rad);this.arcTo(x,y+h,x,y,rad);this.arcTo(x,y,x+w,y,rad);return this}
}
rs();loop(0);
console.log('⚔ 巨劍守護 v2.1 - 裝備/強化/道具/建築/關卡/Boss/休息');
